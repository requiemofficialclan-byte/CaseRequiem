<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | DISCORD АВТОРИЗАЦИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            background: #111;
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .balance {
            background: linear-gradient(135deg, #1a1a1a, #222);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #1a1a1a, #222);
            padding: 8px 25px;
            border-radius: 50px;
            cursor: pointer;
            border: 1px solid #333;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #5865F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .discord-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .discord-btn:hover {
            background: #4752c4;
            transform: scale(1.02);
        }

        .key-section {
            background: linear-gradient(135deg, #1a1a1a, #222);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            border: 1px solid #333;
        }

        .key-input {
            background: #0a0a0a;
            border: 2px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            width: 250px;
            font-family: monospace;
        }

        .key-input:focus {
            outline: none;
            border-color: #5865F2;
        }

        .key-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 3em;
            background: linear-gradient(45deg, #5865F2, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-message {
            text-align: center;
            padding: 60px;
            background: #111;
            border-radius: 30px;
            border: 2px solid #5865F2;
        }

        .login-message h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .login-message p {
            color: #666;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 2em;
            margin: 50px 0 30px;
            color: #666;
            border-left: 4px solid #5865F2;
            padding-left: 20px;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .case-card {
            background: linear-gradient(135deg, #111, #1a1a1a);
            border: 2px solid #333;
            border-radius: 30px;
            padding: 30px;
            transition: 0.3s;
            position: relative;
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: var(--case-color);
            box-shadow: 0 0 20px var(--case-color);
        }

        .case-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-key {
            background: #ff4757;
            color: white;
        }

        .badge-season {
            background: #5865F2;
            color: white;
        }

        .case-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }

        .case-name {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: var(--case-color);
            margin-bottom: 10px;
        }

        .case-price {
            text-align: center;
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 25px;
        }

        .roles-table {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 20px 0;
        }

        .role-row {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .role-percent {
            font-size: 18px;
            font-weight: bold;
            color: #5865F2;
            min-width: 45px;
        }

        .role-plus {
            color: #5865F2;
            font-size: 18px;
            min-width: 20px;
        }

        .role-name {
            font-size: 16px;
            flex: 1;
        }

        .role-rarity {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 15px;
            background: #333;
        }

        .rarity-legendary { color: #ffae00; }
        .rarity-epic { color: #9c27b0; }
        .rarity-rare { color: #2196f3; }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #333, transparent);
            margin: 25px 0;
        }

        .boost-title {
            color: #5865F2;
            font-size: 18px;
            margin: 20px 0 15px;
        }

        .open-btn {
            background: var(--case-color);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #333;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.3;
            z-index: 100;
        }

        .admin-btn:hover {
            opacity: 1;
            background: #ff4757;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            border-radius: 10px;
            display: none;
            z-index: 2000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-section">
            <div class="balance">
                <span class="balance-amount" id="balance">0</span> 💰
            </div>
            <div class="profile" id="profileBtn" onclick="logout()" style="display: none;">
                <div class="avatar" id="avatar">?</div>
                <span id="username">загрузка...</span>
            </div>
            <button class="discord-btn" id="loginBtn" onclick="loginWithDiscord()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09c-.01-.02-.04-.03-.07-.03c-1.5.26-2.93.71-4.27 1.33c-.01 0-.02.01-.03.02c-2.72 4.07-3.47 8.03-3.1 11.95c0 .02.01.04.03.05c1.8 1.32 3.53 2.12 5.24 2.65c.03.01.06 0 .07-.02c.4-.55.76-1.13 1.07-1.74c.02-.04 0-.08-.04-.09c-.57-.22-1.11-.48-1.64-.78c-.04-.02-.04-.08-.01-.11c.11-.08.22-.17.33-.25c.02-.02.05-.02.07-.01c3.44 1.57 7.15 1.57 10.55 0c.02-.01.05-.01.07.01c.11.09.22.17.33.26c.04.03.04.09-.01.11c-.52.31-1.07.56-1.64.78c-.04.01-.05.06-.04.09c.32.61.68 1.19 1.07 1.74c.03.01.06.02.09.01c1.72-.53 3.45-1.33 5.25-2.65c.02-.01.03-.03.03-.05c.44-4.53-.73-8.46-3.1-11.95c-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.83 2.12-1.89 2.12z"/>
                </svg>
                Войти через Discord
            </button>
        </div>
        
        <div class="key-section">
            <input type="text" class="key-input" id="keyInput" placeholder="ВВЕДИТЕ КЛЮЧ">
            <button class="key-btn" onclick="useKey()">Активировать</button>
        </div>
    </div>

    <div class="container" id="mainContent" style="display: none;">
        <h1>🎲 КЕЙСЫ С РОЛЯМИ</h1>
        
        <div class="section-title">❄️ ЗИМНИЙ СЕЗОН 2025</div>
        <div class="cases-grid" id="winterCase"></div>

        <div class="section-title">🌱 ВЕСЕННИЙ СЕЗОН 2026</div>
        <div class="cases-grid" id="springCase"></div>

        <div class="section-title">🔑 РОЛЕВОЙ КЕЙС</div>
        <div class="cases-grid" id="roleCase"></div>
    </div>

    <div class="container" id="loginMessage">
        <div class="login-message">
            <h2>🔐 Требуется авторизация</h2>
            <p>Войдите через Discord, чтобы открывать кейсы</p>
            <button class="discord-btn" onclick="loginWithDiscord()" style="margin: 0 auto;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09c-.01-.02-.04-.03-.07-.03c-1.5.26-2.93.71-4.27 1.33c-.01 0-.02.01-.03.02c-2.72 4.07-3.47 8.03-3.1 11.95c0 .02.01.04.03.05c1.8 1.32 3.53 2.12 5.24 2.65c.03.01.06 0 .07-.02c.4-.55.76-1.13 1.07-1.74c.02-.04 0-.08-.04-.09c-.57-.22-1.11-.48-1.64-.78c-.04-.02-.04-.08-.01-.11c.11-.08.22-.17.33-.25c.02-.02.05-.02.07-.01c3.44 1.57 7.15 1.57 10.55 0c.02-.01.05-.01.07.01c.11.09.22.17.33.26c.04.03.04.09-.01.11c-.52.31-1.07.56-1.64.78c-.04.01-.05.06-.04.09c.32.61.68 1.19 1.07 1.74c.03.01.06.02.09.01c1.72-.53 3.45-1.33 5.25-2.65c.02-.01.03-.03.03-.05c.44-4.53-.73-8.46-3.1-11.95c-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.83 2.12-1.89 2.12z"/>
                </svg>
                Войти через Discord
            </button>
        </div>
    </div>

    <button class="admin-btn" onclick="openAdmin()">⚙️</button>
    <div class="notification" id="notification"></div>

    <script>
        const SERVER = 'http://localhost:5000';
        let balance = 0;
        let isAuthenticated = false;

        // Проверка авторизации при загрузке
        window.onload = async () => {
            await checkAuth();
            
            // Проверяем параметры URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('login') === 'success') {
                showNotif('✅ Успешный вход через Discord!');
                window.history.replaceState({}, document.title, window.location.pathname);
                await checkAuth();
            }
        };

        async function checkAuth() {
            try {
                const response = await fetch(`${SERVER}/api/auth/me`, {
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.authenticated) {
                    isAuthenticated = true;
                    balance = data.balance;
                    
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('profileBtn').style.display = 'flex';
                    document.getElementById('username').innerText = data.global_name || data.username;
                    document.getElementById('avatar').innerText = (data.global_name || data.username)[0].toUpperCase();
                    document.getElementById('balance').innerText = balance.toLocaleString();
                    
                    document.getElementById('loginMessage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    
                    renderCases();
                } else {
                    isAuthenticated = false;
                    document.getElementById('loginBtn').style.display = 'flex';
                    document.getElementById('profileBtn').style.display = 'none';
                    document.getElementById('loginMessage').style.display = 'block';
                    document.getElementById('mainContent').style.display = 'none';
                }
            } catch (e) {
                console.error('Auth check failed:', e);
            }
        }

        function loginWithDiscord() {
            window.location.href = `${SERVER}/api/auth/discord`;
        }

        async function logout() {
            await fetch(`${SERVER}/api/auth/logout`, {
                method: 'POST',
                credentials: 'include'
            });
            isAuthenticated = false;
            await checkAuth();
            showNotif('👋 Вы вышли из системы');
        }

        function renderCases() {
            renderWinterCase();
            renderSpringCase();
            renderRoleCase();
        }

        function renderWinterCase() {
            const container = document.getElementById('winterCase');
            container.innerHTML = `
                <div class="case-card" style="--case-color: #00d4ff">
                    <div class="case-badge badge-season">🎫 ЗА МОНЕТЫ</div>
                    <div class="case-icon">❄️</div>
                    <div class="case-name">❄️ ЗИМНИЙ КЕЙС 2025</div>
                    <div class="case-price">💰 50,000</div>
                    
                    <div class="roles-table">
                        <div class="role-row"><span class="role-percent">❄️</span><span class="role-name">NY Limited</span><span class="role-rarity rarity-legendary">[L]</span></div>
                        <div class="role-row"><span class="role-percent">🎁</span><span class="role-name">HOLIDAY</span><span class="role-rarity rarity-legendary">[L]</span></div>
                        <div class="role-row"><span class="role-percent">🎄</span><span class="role-name">WINTER</span><span class="role-rarity rarity-legendary">[L]</span></div>
                        <div class="role-row"><span class="role-percent">🌨️</span><span class="role-name">Snow Reaper</span><span class="role-rarity rarity-legendary">[L]</span></div>
                    </div>

                    <button class="open-btn" style="background: #00d4ff" onclick="openWinterCase()">ОТКРЫТЬ КЕЙС</button>
                </div>
            `;
        }

        function renderSpringCase() {
            const container = document.getElementById('springCase');
            container.innerHTML = `
                <div class="case-card" style="--case-color: #00ffcc">
                    <div class="case-badge badge-season">🎫 ЗА МОНЕТЫ</div>
                    <div class="case-icon">🌸</div>
                    <div class="case-name">🌱 ВЕСЕННИЙ КЕЙС 2026</div>
                    <div class="case-price">💰 55,000</div>
                    
                    <div class="roles-table">
                        <div class="role-row"><span class="role-percent">❄️⚡</span><span class="role-name">FrostBolt</span><span class="role-rarity rarity-legendary">[L]</span></div>
                        <div class="role-row"><span class="role-percent">☁️</span><span class="role-name">NeonCloud</span><span class="role-rarity rarity-legendary">[L]</span></div>
                        <div class="role-row"><span class="role-percent">🌩️</span><span class="role-name">AbyssalThunder</span><span class="role-rarity rarity-legendary">[L]</span></div>
                    </div>

                    <button class="open-btn" style="background: #00ffcc" onclick="openSpringCase()">ОТКРЫТЬ КЕЙС</button>
                </div>
            `;
        }

        function renderRoleCase() {
            const container = document.getElementById('roleCase');
            container.innerHTML = `
                <div class="case-card" style="--case-color: #ff4757">
                    <div class="case-badge badge-key">🔑 ТОЛЬКО ПО КЛЮЧУ</div>
                    <div class="case-icon">🎲</div>
                    <div class="case-name">🔑 РОЛЕВОЙ КЕЙС</div>
                    <div class="case-price">🔑 ПО КЛЮЧУ</div>
                    
                    <div class="boost-title">💎 XP BOOST</div>
                    <div class="roles-table">
                        <div class="role-row"><span class="role-percent">23%</span><span class="role-plus">+</span><span class="role-name">Bloodbound</span><span class="role-rarity rarity-legendary">[L]</span></div>
                        <div class="role-row"><span class="role-percent">12%</span><span class="role-plus">+</span><span class="role-name">Shadow</span><span class="role-rarity rarity-epic">[E]</span></div>
                        <div class="role-row"><span class="role-percent">7%</span><span class="role-plus">+</span><span class="role-name">Veteran</span><span class="role-rarity rarity-rare">[R]</span></div>
                        <div class="role-row"><span class="role-percent">3%</span><span class="role-plus">+</span><span class="role-name">Eternal</span><span class="role-rarity rarity-rare">[R]</span></div>
                        <div class="role-row"><span class="role-percent">3%</span><span class="role-plus">+</span><span class="role-name">Phantom</span><span class="role-rarity rarity-rare">[R]</span></div>
                    </div>

                    <div class="divider"></div>

                    <div class="boost-title">💰 MONEY BOOST</div>
                    <div class="roles-table">
                        <div class="role-row"><span class="role-percent">25%</span><span class="role-plus">+</span><span class="role-name">Shadow</span><span class="role-rarity rarity-epic">[E]</span></div>
                        <div class="role-row"><span class="role-percent">12%</span><span class="role-plus">+</span><span class="role-name">Veteran</span><span class="role-rarity rarity-rare">[R]</span></div>
                        <div class="role-row"><span class="role-percent">6%</span><span class="role-plus">+</span><span class="role-name">Eternal</span><span class="role-rarity rarity-rare">[R]</span></div>
                        <div class="role-row"><span class="role-percent">4%</span><span class="role-plus">+</span><span class="role-name">Phantom</span><span class="role-rarity rarity-rare">[R]</span></div>
                        <div class="role-row"><span class="role-percent">3%</span><span class="role-plus">+</span><span class="role-name">Bloodbound</span><span class="role-rarity rarity-legendary">[L]</span></div>
                        <div class="role-row"><span class="role-percent">2%</span><span class="role-plus">+</span><span class="role-name">Chosen</span><span class="role-rarity rarity-legendary">[L]</span></div>
                    </div>

                    <button class="open-btn" style="background: #ff4757" disabled>ТОЛЬКО ПО КЛЮЧУ</button>
                </div>
            `;
        }

        async function useKey() {
            if (!isAuthenticated) {
                showNotif('❌ Сначала войдите через Discord', 'error');
                return;
            }

            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) {
                showNotif('❌ Введите ключ', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER}/api/key/use`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ key: key })
                });

                const data = await response.json();

                if (data.success) {
                    if (data.type === 'balance') {
                        balance += data.value;
                        document.getElementById('balance').innerText = balance.toLocaleString();
                        showNotif(`✅ +${data.value} монет!`);
                    } else {
                        if (data.case_type === 'role') {
                            openRoleCase();
                        } else {
                            showNotif('✅ Ключ активирован!');
                        }
                    }
                    document.getElementById('keyInput').value = '';
                } else {
                    showNotif(data.message, 'error');
                }
            } catch (e) {
                showNotif('❌ Ошибка сервера', 'error');
            }
        }

        async function openWinterCase() {
            if (!isAuthenticated) return;
            if (balance < 50000) {
                showNotif('❌ Нужно 50,000 монет!', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER}/api/case/open`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ case_type: 'winter' })
                });

                const data = await response.json();

                if (data.success) {
                    balance = data.new_balance;
                    document.getElementById('balance').innerText = balance.toLocaleString();

                    const items = ['NY Limited [L]', 'HOLIDAY [L]', 'WINTER [L]', 'Snow Reaper [L]'];
                    const winItem = items[Math.floor(Math.random() * items.length)];
                    
                    showNotif(`🎉 Вы получили: ${winItem}!`);
                }
            } catch (e) {
                showNotif('❌ Ошибка сервера', 'error');
            }
        }

        async function openSpringCase() {
            if (!isAuthenticated) return;
            if (balance < 55000) {
                showNotif('❌ Нужно 55,000 монет!', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER}/api/case/open`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ case_type: 'spring' })
                });

                const data = await response.json();

                if (data.success) {
                    balance = data.new_balance;
                    document.getElementById('balance').innerText = balance.toLocaleString();

                    const items = ['FrostBolt [L]', 'NeonCloud [L]', 'AbyssalThunder [L]'];
                    const winItem = items[Math.floor(Math.random() * items.length)];
                    
                    showNotif(`🎉 Вы получили: ${winItem}!`);
                }
            } catch (e) {
                showNotif('❌ Ошибка сервера', 'error');
            }
        }

        function openRoleCase() {
            const xpRoles = [
                { name: 'Bloodbound', percent: 23, rarity: '[L]' },
                { name: 'Shadow', percent: 12, rarity: '[E]' },
                { name: 'Veteran', percent: 7, rarity: '[R]' },
                { name: 'Eternal', percent: 3, rarity: '[R]' },
                { name: 'Phantom', percent: 3, rarity: '[R]' }
            ];

            const moneyRoles = [
                { name: 'Shadow', percent: 25, rarity: '[E]' },
                { name: 'Veteran', percent: 12, rarity: '[R]' },
                { name: 'Eternal', percent: 6, rarity: '[R]' },
                { name: 'Phantom', percent: 4, rarity: '[R]' },
                { name: 'Bloodbound', percent: 3, rarity: '[L]' },
                { name: 'Chosen', percent: 2, rarity: '[L]' }
            ];

            const boostType = Math.random() < 0.5 ? 'xp' : 'money';
            
            if (boostType === 'xp') {
                const total = xpRoles.reduce((sum, item) => sum + item.percent, 0);
                let rand = Math.random() * total;
                let cumulative = 0;
                let winItem = xpRoles[0];
                
                for (let item of xpRoles) {
                    cumulative += item.percent;
                    if (rand <= cumulative) {
                        winItem = item;
                        break;
                    }
                }
                showNotif(`🎉 Вы получили: ${winItem.name} ${winItem.rarity} (${winItem.percent}% XP Boost)!`);
            } else {
                const total = moneyRoles.reduce((sum, item) => sum + item.percent, 0);
                let rand = Math.random() * total;
                let cumulative = 0;
                let winItem = moneyRoles[0];
                
                for (let item of moneyRoles) {
                    cumulative += item.percent;
                    if (rand <= cumulative) {
                        winItem = item;
                        break;
                    }
                }
                showNotif(`🎉 Вы получили: ${winItem.name} ${winItem.rarity} (${winItem.percent}% Money Boost)!`);
            }
        }

        // Админ функции
        function openAdmin() {
            const pass = prompt('Пароль админа:');
            if (pass === '1337') {
                window.location.href = '/admin.html';
            }
        }

        function showNotif(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.style.background = type === 'success' ? '#5865F2' : '#ff4757';
            notif.style.color = 'white';
            notif.innerText = text;
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
