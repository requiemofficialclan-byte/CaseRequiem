<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | PREMIUM EDITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --main-color: #00ffcc;
            --winter-color: #00d4ff;
            --bg-dark: #0a0a0a;
            --neon-glow: 0 0 10px rgba(0, 255, 204, 0.5);
            --admin-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a1a 100%);
            color: white;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимация частиц */
        .particle {
            position: fixed;
            top: -10%;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
            opacity: 0.3;
            font-size: 20px;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #111;
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #333;
            transition: 0.3s;
            cursor: pointer;
        }

        .user-profile:hover {
            border-color: var(--main-color);
            box-shadow: var(--neon-glow);
        }

        .avatar {
            width: 35px;
            height: 35px;
            background: var(--main-color);
            border-radius: 50%;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        /* Главное меню */
        .case-selector {
            display: flex;
            gap: 30px;
            margin-top: 80px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .case-card {
            background: #111;
            padding: 30px;
            border-radius: 30px;
            border: 2px solid #333;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 250px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .case-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .case-card:hover::before {
            animation: shine 1s;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .case-card:hover {
            transform: translateY(-15px);
            border-color: var(--main-color);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }

        .case-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .case-card:hover img {
            transform: scale(1.1);
        }

        /* Экран кейса */
        .main-container {
            text-align: center;
            display: none;
            width: 90%;
            max-width: 700px;
            margin-top: 30px;
            z-index: 100;
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid #333;
            position: relative;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            font-size: 14px;
        }

        .back-button:hover {
            border-color: var(--main-color);
            color: var(--main-color);
            transform: translateX(-5px);
        }

        .back-button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        input {
            background: #1a1a1a;
            border: 2px solid #333;
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            width: 100%;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--main-color);
            box-shadow: var(--neon-glow);
        }

        .btn {
            background: var(--main-color);
            color: black;
            border: none;
            padding: 15px 30px;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Рулетка */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 180px;
            border: 2px solid #333;
            background: #000;
            overflow: hidden;
            border-radius: 20px;
            display: none;
            margin-top: 20px;
        }

        .selector {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #ff4757;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #ff4757;
        }

        .selector::before,
        .selector::after {
            content: '';
            position: absolute;
            left: -6px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
        }

        .selector::before {
            top: -5px;
            border-top: 12px solid #ff4757;
        }

        .selector::after {
            bottom: -5px;
            border-bottom: 12px solid #ff4757;
        }

        .tape {
            display: flex;
            position: absolute;
            left: 0;
            top: 15px;
            transition: transform 8s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .item {
            width: 150px;
            height: 150px;
            margin: 0 5px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            border-radius: 15px;
            border: 2px solid #222;
            transition: 0.3s;
        }

        .item img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

        #result {
            display: none;
            margin-top: 30px;
            padding: 30px;
            border-radius: 25px;
            background: #1a1a1a;
            border: 2px solid var(--main-color);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Админ панель */
        .admin-gear {
            position: fixed;
            bottom: 20px;
            right: 20px;
            opacity: 0.3;
            cursor: pointer;
            border: none;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 24px;
            padding: 12px;
            border-radius: 50%;
            transition: 0.3s;
            z-index: 1000;
            backdrop-filter: blur(5px);
            border: 1px solid #333;
        }

        .admin-gear:hover {
            opacity: 1;
            transform: rotate(180deg) scale(1.1);
            background: var(--admin-gradient);
            border-color: transparent;
        }

        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .admin-container {
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            border: 2px solid #667eea;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-header h2 {
            font-size: 2em;
            background: var(--admin-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .admin-header p {
            color: #888;
            font-size: 14px;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            background: var(--admin-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }

        .admin-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .admin-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            width: 100%;
        }

        .admin-btn:hover {
            background: var(--admin-gradient);
            border-color: transparent;
            transform: translateX(10px);
        }

        .admin-btn i {
            font-size: 20px;
            min-width: 30px;
        }

        .key-display {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 1px solid #667eea;
            position: relative;
            display: none;
        }

        .key-display.show {
            display: block;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px #667eea; }
            50% { box-shadow: 0 0 20px #667eea; }
            100% { box-shadow: 0 0 5px #667eea; }
        }

        .key-text {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: #667eea;
            text-align: center;
            word-break: break-all;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .close-admin {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-admin:hover {
            background: #ff4757;
            transform: rotate(90deg);
        }

        .key-status {
            font-size: 12px;
            margin-top: 5px;
            min-height: 20px;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top: 2px solid var(--main-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .case-selector {
                gap: 20px;
            }
            
            .case-card {
                width: 200px;
                padding: 20px;
            }
            
            .admin-stats {
                grid-template-columns: 1fr;
            }
            
            .back-button {
                top: 10px;
                left: 10px;
                padding: 5px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="header">
        <div class="user-profile" onclick="changeUsername()">
            <div class="avatar" id="avatar">?</div>
            <span id="player-user">username</span>
        </div>
        <div style="font-size: 11px; color: #555; font-family: monospace;">
            ID: <span id="session-id">----</span>
        </div>
    </div>

    <!-- Главное меню -->
    <div id="selector-screen">
        <h1 style="text-align:center; margin-top:40px; letter-spacing: 2px; font-size: 2.5em; text-shadow: 0 0 10px var(--main-color);">
            🎲 ВЫБЕРИТЕ КЕЙС
        </h1>
        <div class="case-selector">
            <div class="case-card" onclick="selectCase('spring')">
                <img src="https://cdn-icons-png.flaticon.com/512/2850/2850906.png" alt="Spring">
                <h3>ВЕСЕННИЙ</h3>
                <div style="font-size: 10px; color: var(--main-color);">[SPRG КЛЮЧИ]</div>
                <div style="margin-top: 10px; font-size: 12px; color: #666;">🌱 4 предмета</div>
            </div>
            <div class="case-card" style="border-color:var(--winter-color);" onclick="selectCase('winter')">
                <img src="https://cdn-icons-png.flaticon.com/512/2322/2322731.png" alt="Winter">
                <h3 style="color:var(--winter-color);">ЗИМНИЙ</h3>
                <div style="font-size: 10px; color: var(--winter-color);">[WINT КЛЮЧИ]</div>
                <div style="margin-top: 10px; font-size: 12px; color: #666;">❄️ 4 предмета</div>
            </div>
        </div>
    </div>

    <!-- Экран кейса -->
    <div class="main-container" id="case-screen">
        <button class="back-button" onclick="goBack()">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Назад
        </button>
        
        <h1 id="case-title" style="margin-bottom: 15px;">КЕЙС</h1>
        <img src="" id="case-preview" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--main-color); margin-bottom:20px; object-fit: cover;">
        
        <div id="setup">
            <input type="text" id="id-key" placeholder="ВСТАВЬТЕ КЛЮЧ" autocomplete="off">
            <div class="key-status" id="key-status"></div>
            <button class="btn" id="main-btn" onclick="startSpin()">АКТИВИРОВАТЬ</button>
        </div>

        <div class="roulette-wrapper" id="roulette-box">
            <div class="selector"></div>
            <div class="tape" id="tape"></div>
        </div>

        <div id="result">
            <h2 id="win-name" style="margin-bottom: 10px;"></h2>
            <p id="win-rarity" style="font-size: 1.2em;"></p>
            <button class="btn" onclick="resetToMenu()" style="width:auto; padding:10px 40px; margin-top: 15px;">ЗАВЕРШИТЬ</button>
        </div>
    </div>

    <!-- Кнопка админки -->
    <button class="admin-gear" onclick="openAdminPanel()">⚙️</button>

    <!-- Админ панель -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-container">
            <button class="close-admin" onclick="closeAdminPanel()">✕</button>
            
            <div class="admin-header">
                <h2>⚡ ADMIN PANEL</h2>
                <p>Управление ключами и статистика</p>
            </div>

            <div class="admin-stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalKeys">0</div>
                    <div class="stat-label">Всего ключей</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="springKeys">0</div>
                    <div class="stat-label">Весенних</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="winterKeys">0</div>
                    <div class="stat-label">Зимних</div>
                </div>
            </div>

            <div class="admin-actions">
                <button class="admin-btn" onclick="adminGenerateKey('spring')">
                    <i>🌱</i>
                    Создать весенний ключ
                </button>
                <button class="admin-btn" onclick="adminGenerateKey('winter')">
                    <i>❄️</i>
                    Создать зимний ключ
                </button>
                <button class="admin-btn" onclick="showAllKeys()">
                    <i>📋</i>
                    Показать все ключи
                </button>
                <button class="admin-btn" onclick="clearUsedKeys()">
                    <i>🗑️</i>
                    Очистить историю
                </button>
            </div>

            <div class="key-display" id="keyDisplay">
                <div class="key-text" id="generatedKey"></div>
                <button class="copy-btn" onclick="copyGeneratedKey()">📋 Копировать</button>
            </div>

            <div class="key-display" id="keysList" style="max-height: 200px; overflow-y: auto;">
                <div id="keysListContent"></div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1483941280248496210/QHWJYcnhPD8Voht5mElw7KVNX-vr4yU5gHQrFoAwTE14vqB9MNnIISuTCjOfMYCEq0cA";
        const ADMIN_PASS = "1337";
        
        let selectedType = "";
        let usernameDiscord = "гость";
        let isSpinning = false;
        let currentGeneratedKey = "";
        
        // Система одноразовых ключей
        let usedKeys = JSON.parse(localStorage.getItem('usedKeys')) || [];

        const items = {
            spring: [
                { name: "🌩 Storm Bringer", img: "https://cdn-icons-png.flaticon.com/512/1146/1146869.png", rarity: "Легендарный", color: "#ffae00", chance: 1 },
                { name: "🌱 Grass Blade", img: "https://cdn-icons-png.flaticon.com/512/2850/2850906.png", rarity: "Обычный", color: "#aaa", chance: 49 },
                { name: "🌼 Spring Flower", img: "https://cdn-icons-png.flaticon.com/512/2936/2936890.png", rarity: "Редкий", color: "#4caf50", chance: 30 },
                { name: "🦋 Butterfly Wing", img: "https://cdn-icons-png.flaticon.com/512/3095/3095256.png", rarity: "Эпический", color: "#9c27b0", chance: 20 }
            ],
            winter: [
                { name: "❄️ Ice King Sword", img: "https://cdn-icons-png.flaticon.com/512/2322/2322731.png", rarity: "Легендарный", color: "#ffae00", chance: 1 },
                { name: "⛄ Snowball", img: "https://cdn-icons-png.flaticon.com/512/2334/2334861.png", rarity: "Обычный", color: "#aaa", chance: 49 },
                { name: "🎄 Frost Cape", img: "https://cdn-icons-png.flaticon.com/512/2936/2936845.png", rarity: "Редкий", color: "#2196f3", chance: 30 },
                { name: "🦌 Reindeer Horns", img: "https://cdn-icons-png.flaticon.com/512/2936/2936875.png", rarity: "Эпический", color: "#9c27b0", chance: 20 }
            ]
        };

        // Создание частиц
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * -20 + 's';
                particle.innerHTML = ['✨', '❄️', '⭐', '🌟', '💫'][Math.floor(Math.random() * 5)];
                particlesContainer.appendChild(particle);
            }
        }

        window.onload = () => {
            createParticles();
            let savedUser = localStorage.getItem('discordUser');
            if (savedUser) {
                usernameDiscord = savedUser;
            } else {
                let n = prompt("Твой Username в Discord (без @):");
                usernameDiscord = n ? n.toLowerCase().trim() : "гость";
                localStorage.setItem('discordUser', usernameDiscord);
            }
            updateUserDisplay();
            document.getElementById('session-id').innerText = Math.random().toString(36).substr(2, 8).toUpperCase();
        };

        function updateUserDisplay() {
            document.getElementById('player-user').innerText = "@" + usernameDiscord;
            document.getElementById('avatar').innerText = usernameDiscord[0].toUpperCase();
        }

        function changeUsername() {
            let n = prompt("Новый Username в Discord (без @):");
            if (n) {
                usernameDiscord = n.toLowerCase().trim();
                localStorage.setItem('discordUser', usernameDiscord);
                updateUserDisplay();
            }
        }

        function selectCase(type) {
            selectedType = type;
            document.getElementById('selector-screen').style.display = 'none';
            document.getElementById('case-screen').style.display = 'block';
            
            if(type === 'winter') {
                document.getElementById('case-title').innerText = "❄️ WINTER FROST";
                document.getElementById('case-preview').src = "https://cdn-icons-png.flaticon.com/512/2322/2322731.png";
                document.documentElement.style.setProperty('--main-color', '#00d4ff');
            } else {
                document.getElementById('case-title').innerText = "🌱 SPRING DROP";
                document.getElementById('case-preview').src = "https://cdn-icons-png.flaticon.com/512/2850/2850906.png";
                document.documentElement.style.setProperty('--main-color', '#00ffcc');
            }
            
            document.getElementById('id-key').value = '';
            document.getElementById('key-status').innerHTML = '';
            document.getElementById('id-key').focus();
        }

        function goBack() {
            if (isSpinning) {
                if (!confirm('Спин в процессе! Вернуться в меню?')) return;
            }
            resetSpin();
            document.getElementById('selector-screen').style.display = 'block';
            document.getElementById('case-screen').style.display = 'none';
        }

        function resetToMenu() {
            resetSpin();
            document.getElementById('selector-screen').style.display = 'block';
            document.getElementById('case-screen').style.display = 'none';
        }

        function resetSpin() {
            isSpinning = false;
            document.getElementById('setup').style.display = 'block';
            document.getElementById('roulette-box').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('main-btn').disabled = false;
            document.getElementById('id-key').value = '';
        }

        function isKeyUsed(key) {
            return usedKeys.includes(key);
        }

        function markKeyAsUsed(key) {
            usedKeys.push(key);
            localStorage.setItem('usedKeys', JSON.stringify(usedKeys));
            updateAdminStats();
        }

        function validateKey(key, type) {
            const prefix = type === 'winter' ? 'WINT' : 'SPRG';
            const keyRegex = new RegExp(`^${prefix}-[A-Z0-9]{8}-[A-Z]$`);
            
            if (!keyRegex.test(key)) {
                return { valid: false, reason: '❌ Неверный формат ключа' };
            }
            
            const secretChar = key.split('-')[2];
            if (secretChar !== 'L') {
                return { valid: false, reason: '❌ Неверный секретный символ' };
            }
            
            if (isKeyUsed(key)) {
                return { valid: false, reason: '❌ Этот ключ уже был использован!' };
            }
            
            return { valid: true };
        }

        function startSpin() {
            if (isSpinning) return;
            
            const inputKey = document.getElementById('id-key').value.trim().toUpperCase();
            const validation = validateKey(inputKey, selectedType);
            
            if (!validation.valid) {
                document.getElementById('key-status').innerHTML = validation.reason;
                document.getElementById('key-status').style.color = '#ff4757';
                return;
            }

            isSpinning = true;
            document.getElementById('key-status').innerHTML = '';
            document.getElementById('main-btn').disabled = true;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('roulette-box').style.display = 'block';

            markKeyAsUsed(inputKey);

            const pool = items[selectedType];
            const tape = document.getElementById('tape');
            tape.innerHTML = "";
            
            for(let i = 0; i < 120; i++) {
                let it = pool[Math.floor(Math.random() * pool.length)];
                tape.innerHTML += `<div class="item" style="border-color:${it.color}"><img src="${it.img}"></div>`;
            }

            let r = Math.random() * 100;
            let cumulativeChance = 0;
            let winItem = pool[0];
            
            for (let item of pool) {
                cumulativeChance += item.chance;
                if (r <= cumulativeChance) {
                    winItem = item;
                    break;
                }
            }
            
            const blocks = tape.getElementsByClassName('item');
            blocks[90].innerHTML = `<img src="${winItem.img}">`;
            blocks[90].style.borderColor = winItem.color;

            setTimeout(() => {
                tape.style.transform = `translateX(-${(90 * 160) - (tape.parentElement.offsetWidth / 2) + 80}px)`;
            }, 100);

            setTimeout(() => {
                document.getElementById('win-name').innerText = winItem.name;
                document.getElementById('win-rarity').innerText = winItem.rarity;
                document.getElementById('win-rarity').style.color = winItem.color;
                document.getElementById('result').style.display = 'block';

                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🎁 КЛЮЧ ИСПОЛЬЗОВАН",
                            description: `**Игрок:** \`@${usernameDiscord}\`\n**Ключ:** \`${inputKey}\`\n**Кейс:** ${selectedType === 'winter' ? '❄️ Зимний' : '🌱 Весенний'}\n**Приз:** ${winItem.name} (${winItem.rarity})`,
                            color: parseInt(winItem.color.replace('#', ''), 16),
                            footer: { text: "Одноразовый ключ • Больше не действителен" },
                            timestamp: new Date().toISOString()
                        }]
                    })
                }).catch(e => console.log('Webhook error:', e));

                isSpinning = false;
            }, 8500);
        }

        // Админ панель функции
        function openAdminPanel() {
            const pass = prompt("🔐 Введите пароль администратора:");
            if (pass === ADMIN_PASS) {
                document.getElementById('adminPanel').style.display = 'flex';
                updateAdminStats();
                document.getElementById('keyDisplay').classList.remove('show');
                document.getElementById('keysList').classList.remove('show');
            } else if (pass !== null) {
                alert("❌ Неверный пароль!");
            }
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function updateAdminStats() {
            const total = usedKeys.length;
            const spring = usedKeys.filter(k => k.startsWith('SPRG')).length;
            const winter = usedKeys.filter(k => k.startsWith('WINT')).length;
            
            document.getElementById('totalKeys').innerText = total;
            document.getElementById('springKeys').innerText = spring;
            document.getElementById('winterKeys').innerText = winter;
        }

        function adminGenerateKey(type) {
            const prefix = type === 'winter' ? 'WINT' : 'SPRG';
            const randomPart = Math.random().toString(36).substr(2, 8).toUpperCase();
            const secretChar = "L";
            const newKey = `${prefix}-${randomPart}-${secretChar}`;
            
            currentGeneratedKey = newKey;
            document.getElementById('generatedKey').innerText = newKey;
            document.getElementById('keyDisplay').classList.add('show');
            document.getElementById('keysList').classList.remove('show');
            
            navigator.clipboard?.writeText(newKey).catch(() => {});
        }

        function copyGeneratedKey() {
            navigator.clipboard?.writeText(currentGeneratedKey).then(() => {
                alert('✅ Ключ скопирован!');
            }).catch(() => {
                alert('📋 Ключ: ' + currentGeneratedKey);
            });
        }

        function showAllKeys() {
            if (usedKeys.length === 0) {
                document.getElementById('keysListContent').innerHTML = '<p style="color: #666; text-align: center;">Нет использованных ключей</p>';
            } else {
                let html = '<h4 style="margin-bottom: 10px;">📋 Использованные ключи:</h4>';
                usedKeys.slice().reverse().forEach((key, index) => {
                    const type = key.startsWith('SPRG') ? '🌱' : '❄️';
                    html += `<div style="font-family: monospace; padding: 5px; border-bottom: 1px solid #333;">${type} ${key}</div>`;
                });
                document.getElementById('keysListContent').innerHTML = html;
            }
            document.getElementById('keysList').classList.add('show');
            document.getElementById('keyDisplay').classList.remove('show');
        }

        function clearUsedKeys() {
            if (confirm('⚠️ Точно очистить все использованные ключи?')) {
                usedKeys = [];
                localStorage.removeItem('usedKeys');
                updateAdminStats();
                document.getElementById('keysList').classList.remove('show');
                document.getElementById('keyDisplay').classList.remove('show');
                alert('✅ История очищена');
            }
        }

        // Обработка Enter
        document.getElementById('id-key')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isSpinning) {
                startSpin();
            }
        });

        // Закрытие по Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('adminPanel').style.display === 'flex') {
                closeAdminPanel();
            }
        });
    </script>
</body>
</html>
