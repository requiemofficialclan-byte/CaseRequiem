<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | СЕРВЕРНАЯ ВЕРСИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            min-height: 100vh;
        }

        .header {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .balance {
            background: linear-gradient(135deg, #1a1a1a, #222);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #333;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .auth-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .auth-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #5865F2;
        }

        .key-section {
            background: #1a1a1a;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            border: 1px solid #333;
        }

        .key-input {
            background: #0a0a0a;
            border: 2px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            width: 250px;
            font-family: monospace;
        }

        .key-input:focus {
            outline: none;
            border-color: #5865F2;
        }

        .key-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 3em;
            background: linear-gradient(45deg, #5865F2, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cases {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .case-card {
            background: linear-gradient(135deg, #111, #1a1a1a);
            border: 2px solid #333;
            border-radius: 30px;
            padding: 30px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .case-card:hover {
            transform: translateY(-10px);
            border-color: var(--case-color);
            box-shadow: 0 0 30px var(--case-color);
        }

        .case-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }

        .case-name {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: var(--case-color);
            margin-bottom: 10px;
        }

        .case-price {
            text-align: center;
            font-size: 20px;
            color: #ffd700;
            margin: 15px 0;
            font-weight: bold;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 20px 0;
        }

        .item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .item-name {
            color: white;
        }

        .item-rarity {
            color: #ffae00;
            font-weight: bold;
        }

        .open-btn {
            background: var(--case-color);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .open-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--case-color);
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #111, #1a1a1a);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #5865F2;
            animation: modalPop 0.3s;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #5865F2;
        }

        .modal input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 2px solid #333;
            color: white;
            border-radius: 15px;
            font-size: 16px;
        }

        .modal input:focus {
            outline: none;
            border-color: #5865F2;
        }

        .modal-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-btn.secondary {
            background: transparent;
            border: 2px solid #5865F2;
        }

        .modal-btn.danger {
            background: #ff4757;
        }

        .error-message {
            color: #ff4757;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #333;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.3;
            z-index: 100;
            transition: 0.3s;
        }

        .admin-btn:hover {
            opacity: 1;
            background: #ff4757;
            transform: rotate(90deg);
        }

        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .admin-panel.active {
            display: flex;
        }

        .admin-content {
            background: linear-gradient(135deg, #111, #1a1a1a);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #ff4757;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-header h2 {
            color: #ff4757;
            font-size: 2em;
        }

        .admin-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .admin-section h3 {
            color: #ff4757;
            margin-bottom: 15px;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .keys-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
        }

        .key-item {
            background: #0a0a0a;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
        }

        .key-status {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 5px;
        }

        .status-available {
            background: #00ffcc;
            color: black;
        }

        .status-used {
            background: #ff4757;
            color: white;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            border-radius: 10px;
            display: none;
            z-index: 3000;
            animation: slideIn 0.3s;
            font-weight: bold;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .roulette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 4000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .roulette.active {
            display: flex;
        }

        .roulette-items {
            display: flex;
            gap: 10px;
            animation: spin 3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        .roulette-item {
            width: 100px;
            height: 100px;
            background: #1a1a1a;
            border: 2px solid var(--case-color);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        @keyframes spin {
            0% { transform: translateX(0); }
            100% { transform: translateX(-1000%); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance">💰 <span id="balance">0</span></div>
        
        <div class="user-info" id="userInfo" style="display: none;">
            <span class="username" id="username"></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="auth-buttons" id="authButtons">
            <button class="auth-btn" onclick="showLoginModal()">Войти</button>
            <button class="auth-btn" onclick="showRegisterModal()">Регистрация</button>
        </div>

        <div class="key-section">
            <input type="text" class="key-input" id="keyInput" placeholder="ВВЕДИТЕ КЛЮЧ">
            <button class="key-btn" onclick="useKey()">Активировать</button>
        </div>
    </div>

    <div class="container" id="mainContent" style="display: none;">
        <h1>🎲 СЕЗОННЫЕ КЕЙСЫ</h1>
        <div class="cases" id="cases"></div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>🔐 ВХОД</h2>
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <div class="error-message" id="loginError"></div>
            <button class="modal-btn" onclick="login()">Войти</button>
            <button class="modal-btn secondary" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h2>📝 РЕГИСТРАЦИЯ</h2>
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль">
            <div class="error-message" id="registerError"></div>
            <button class="modal-btn" onclick="register()">Зарегистрироваться</button>
            <button class="modal-btn secondary" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <div class="admin-header">
                <h2>⚡ ADMIN PANEL</h2>
            </div>

            <div id="adminLoginSection">
                <div class="admin-section">
                    <input type="password" id="adminPass" placeholder="Пароль администратора">
                    <button class="modal-btn" onclick="adminLogin()">ВОЙТИ</button>
                </div>
            </div>

            <div id="adminControls" style="display: none;">
                <div class="admin-section">
                    <h3>📊 СТАТИСТИКА</h3>
                    <div class="admin-stats">
                        <div class="stat-card">
                            <div class="stat-value" id="totalUsers">0</div>
                            <div class="stat-label">Пользователей</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalKeys">0</div>
                            <div class="stat-label">Ключей</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="usedKeys">0</div>
                            <div class="stat-label">Использовано</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="availableKeys">0</div>
                            <div class="stat-label">Доступно</div>
                        </div>
                    </div>
                </div>

                <div class="admin-section">
                    <h3>🔑 СОЗДАТЬ КЛЮЧ</h3>
                    <select id="keyType">
                        <option value="balance">💰 На баланс</option>
                        <option value="winter">❄️ На зимний кейс</option>
                        <option value="spring">🌱 На весенний кейс</option>
                        <option value="role">🎲 На ролевой кейс</option>
                    </select>
                    
                    <div id="balanceInput">
                        <input type="number" id="keyValue" placeholder="Сумма" value="1000">
                    </div>
                    
                    <button class="modal-btn" onclick="createKey()">СОЗДАТЬ КЛЮЧ</button>
                    
                    <div id="newKeyDisplay" style="display: none; margin-top: 15px;">
                        <div style="background: #0a0a0a; padding: 15px; border-radius: 10px; font-family: monospace; word-break: break-all;" id="newKeyText"></div>
                        <button class="modal-btn" onclick="copyKey()">КОПИРОВАТЬ</button>
                    </div>
                </div>

                <div class="admin-section">
                    <h3>📋 ВСЕ КЛЮЧИ</h3>
                    <div class="keys-list" id="keysList"></div>
                    <button class="modal-btn" onclick="loadKeys()">ОБНОВИТЬ</button>
                </div>

                <div class="admin-section">
                    <h3>👥 ПОЛЬЗОВАТЕЛИ</h3>
                    <div class="keys-list" id="usersList"></div>
                    <button class="modal-btn" onclick="loadUsers()">ОБНОВИТЬ</button>
                </div>

                <button class="modal-btn danger" onclick="logoutAdmin()">ВЫЙТИ</button>
            </div>

            <button class="modal-btn secondary" onclick="closeAdmin()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="roulette" id="roulette">
        <div class="roulette-items" id="rouletteItems"></div>
    </div>

    <button class="admin-btn" onclick="openAdmin()">⚙️</button>
    <div class="notification" id="notification"></div>

    <script>
        const SERVER = 'http://localhost:5000';
        let currentUser = null;
        let balance = 0;
        let adminLoggedIn = false;

        const cases = [
            {
                name: '❄️ ЗИМНИЙ КЕЙС 2025',
                icon: '❄️',
                price: 50000,
                color: '#00d4ff',
                items: [
                    { name: 'NY Limited', rarity: 'LEGENDARY' },
                    { name: 'HOLIDAY', rarity: 'LEGENDARY' },
                    { name: 'WINTER', rarity: 'LEGENDARY' },
                    { name: 'Snow Reaper', rarity: 'LEGENDARY' }
                ]
            },
            {
                name: '🌱 ВЕСЕННИЙ КЕЙС 2026',
                icon: '🌸',
                price: 55000,
                color: '#00ffcc',
                items: [
                    { name: 'FrostBolt', rarity: 'LEGENDARY' },
                    { name: 'NeonCloud', rarity: 'LEGENDARY' },
                    { name: 'AbyssalThunder', rarity: 'LEGENDARY' }
                ]
            },
            {
                name: '🔑 РОЛЕВОЙ КЕЙС',
                icon: '🎲',
                price: 0,
                color: '#ff4757',
                keyOnly: true,
                items: [
                    { name: 'Bloodbound', rarity: 'LEGENDARY' },
                    { name: 'Shadow', rarity: 'EPIC' },
                    { name: 'Veteran', rarity: 'RARE' },
                    { name: 'Eternal', rarity: 'RARE' },
                    { name: 'Phantom', rarity: 'RARE' },
                    { name: 'Chosen', rarity: 'LEGENDARY' }
                ]
            }
        ];

        window.onload = () => {
            checkSession();
            renderCases();
        };

        async function checkSession() {
            const session = localStorage.getItem('session');
            if (session) {
                const data = JSON.parse(session);
                currentUser = data.username;
                await loadBalance();
                updateUIForAuth();
            } else {
                updateUIForGuest();
            }
        }

        async function loadBalance() {
            try {
                const res = await fetch(`${SERVER}/api/get_balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser })
                });
                const data = await res.json();
                balance = data.balance;
                document.getElementById('balance').innerText = balance.toLocaleString();
            } catch (e) {
                showNotification('❌ Ошибка загрузки баланса', 'error');
            }
        }

        function updateUIForAuth() {
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('username').innerText = currentUser;
            document.getElementById('mainContent').style.display = 'block';
        }

        function updateUIForGuest() {
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
        }

        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function showRegisterModal() {
            document.getElementById('registerModal').classList.add('active');
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            document.getElementById('registerError').style.display = 'none';
        }

        function closeModals() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('registerModal').classList.remove('active');
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                document.getElementById('loginError').innerText = 'Заполните все поля';
                document.getElementById('loginError').style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${SERVER}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    currentUser = username;
                    balance = data.balance;
                    localStorage.setItem('session', JSON.stringify({ username }));
                    
                    closeModals();
                    updateUIForAuth();
                    document.getElementById('balance').innerText = balance.toLocaleString();
                    showNotification('✅ Успешный вход!');
                } else {
                    document.getElementById('loginError').innerText = data.message;
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (e) {
                showNotification('❌ Ошибка сервера', 'error');
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;

            if (!username || !password || !confirm) {
                document.getElementById('registerError').innerText = 'Заполните все поля';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            if (password !== confirm) {
                document.getElementById('registerError').innerText = 'Пароли не совпадают';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            if (username.length < 3) {
                document.getElementById('registerError').innerText = 'Имя должно быть минимум 3 символа';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            if (password.length < 4) {
                document.getElementById('registerError').innerText = 'Пароль должен быть минимум 4 символа';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${SERVER}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    showNotification('✅ Регистрация успешна! Теперь войдите');
                    closeModals();
                    showLoginModal();
                } else {
                    document.getElementById('registerError').innerText = data.message;
                    document.getElementById('registerError').style.display = 'block';
                }
            } catch (e) {
                showNotification('❌ Ошибка сервера', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('session');
            currentUser = null;
            balance = 0;
            updateUIForGuest();
            showNotification('👋 Вы вышли');
        }

        function renderCases() {
            const container = document.getElementById('cases');
            container.innerHTML = '';
            
            cases.forEach(c => {
                const itemsHtml = c.items.map(item => `
                    <div class="item">
                        <span class="item-name">${item.name}</span>
                        <span class="item-rarity">[${item.rarity}]</span>
                    </div>
                `).join('');
                
                container.innerHTML += `
                    <div class="case-card" style="--case-color: ${c.color}">
                        <div class="case-icon">${c.icon}</div>
                        <div class="case-name">${c.name}</div>
                        <div class="case-price">${c.price ? '💰 ' + c.price.toLocaleString() : '🔑 ПО КЛЮЧУ'}</div>
                        <div class="items-list">${itemsHtml}</div>
                        <button class="open-btn" 
                                style="background: ${c.color}"
                                onclick="openCase('${c.name}')"
                                ${c.keyOnly ? 'disabled' : ''}>
                            ${c.keyOnly ? 'ТОЛЬКО ПО КЛЮЧУ' : 'ОТКРЫТЬ КЕЙС'}
                        </button>
                    </div>
                `;
            });
        }

        async function useKey() {
            if (!currentUser) {
                showNotification('❌ Сначала войдите', 'error');
                return;
            }

            const keyText = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!keyText) {
                showNotification('❌ Введите ключ', 'error');
                return;
            }

            try {
                const res = await fetch(`${SERVER}/api/use_key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: keyText, username: currentUser })
                });
                const data = await res.json();

                if (data.success) {
                    if (data.type === 'balance') {
                        balance = data.balance;
                        document.getElementById('balance').innerText = balance.toLocaleString();
                        showNotification(`✅ +${data.value} монет!`);
                    } else {
                        if (data.case_type === 'role') {
                            openRoleCase();
                        } else {
                            showNotification(`✅ Ключ активирован!`);
                        }
                    }
                    document.getElementById('keyInput').value = '';
                } else {
                    showNotification(data.message, 'error');
                }
            } catch (e) {
                showNotification('❌ Ошибка сервера', 'error');
            }
        }

        async function openCase(caseName) {
            if (!currentUser) {
                showNotification('❌ Сначала войдите', 'error');
                return;
            }

            const caseData = cases.find(c => c.name === caseName);
            if (!caseData || caseData.keyOnly) return;

            if (balance < caseData.price) {
                showNotification('❌ Недостаточно монет!', 'error');
                return;
            }

            // Показываем анимацию
            const roulette = document.getElementById('roulette');
            const items = document.getElementById('rouletteItems');
            
            items.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                items.innerHTML += `<div class="roulette-item" style="--case-color: ${caseData.color}">${caseData.icon}</div>`;
            }
            
            const winItem = caseData.items[Math.floor(Math.random() * caseData.items.length)];
            
            roulette.classList.add('active');
            
            // Обновляем баланс на сервере
            const newBalance = balance - caseData.price;
            
            try {
                await fetch(`${SERVER}/api/update_balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser, balance: newBalance })
                });
                
                balance = newBalance;
                document.getElementById('balance').innerText = balance.toLocaleString();
            } catch (e) {
                console.error('Failed to update balance');
            }
            
            setTimeout(() => {
                roulette.classList.remove('active');
                showNotification(`🎉 Вы получили: ${winItem.name} [${winItem.rarity}]!`);
            }, 3000);
        }

        function openRoleCase() {
            const items = [
                { name: 'Bloodbound', rarity: 'LEGENDARY' },
                { name: 'Shadow', rarity: 'EPIC' },
                { name: 'Veteran', rarity: 'RARE' },
                { name: 'Eternal', rarity: 'RARE' },
                { name: 'Phantom', rarity: 'RARE' },
                { name: 'Chosen', rarity: 'LEGENDARY' }
            ];

            const winItem = items[Math.floor(Math.random() * items.length)];
            showNotification(`🎉 Вы получили: ${winItem.name} [${winItem.rarity}]!`);
        }

        function openAdmin() {
            document.getElementById('adminPanel').classList.add('active');
            document.getElementById('adminLoginSection').style.display = 'block';
            document.getElementById('adminControls').style.display = 'none';
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
            adminLoggedIn = false;
        }

        async function adminLogin() {
            const pass = document.getElementById('adminPass').value;
            
            try {
                const res = await fetch(`${SERVER}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });
                const data = await res.json();

                if (data.success) {
                    adminLoggedIn = true;
                    document.getElementById('adminLoginSection').style.display = 'none';
                    document.getElementById('adminControls').style.display = 'block';
                    loadAdminStats();
                    loadKeys();
                    loadUsers();
                    showNotification('✅ Добро пожаловать, Админ!');
                } else {
                    showNotification('❌ Неверный пароль', 'error');
                }
            } catch (e) {
                showNotification('❌ Ошибка сервера', 'error');
            }
        }

        function logoutAdmin() {
            adminLoggedIn = false;
            document.getElementById('adminLoginSection').style.display = 'block';
            document.getElementById('adminControls').style.display = 'none';
        }

        async function loadAdminStats() {
            try {
                const res = await fetch(`${SERVER}/api/admin/get_stats`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: '34125' })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('totalUsers').innerText = data.total_users;
                    document.getElementById('totalKeys').innerText = data.total_keys;
                    document.getElementById('usedKeys').innerText = data.used_keys;
                    document.getElementById('availableKeys').innerText = data.available_keys;
                }
            } catch (e) {
                console.error('Failed to load stats');
            }
        }

        async function createKey() {
            const type = document.getElementById('keyType').value;
            const data = {
                password: '34125',
                key_type: type
            };

            if (type === 'balance') {
                data.value = parseInt(document.getElementById('keyValue').value) || 1000;
            } else {
                data.case_type = type;
            }

            try {
                const res = await fetch(`${SERVER}/api/admin/create_key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    document.getElementById('newKeyText').innerText = result.key;
                    document.getElementById('newKeyDisplay').style.display = 'block';
                    showNotification('✅ Ключ создан!');
                    loadKeys();
                    loadAdminStats();
                }
            } catch (e) {
                showNotification('❌ Ошибка создания ключа', 'error');
            }
        }

        function copyKey() {
            const key = document.getElementById('newKeyText').innerText;
            navigator.clipboard.writeText(key);
            showNotification('✅ Ключ скопирован!');
        }

        async function loadKeys() {
            try {
                const res = await fetch(`${SERVER}/api/admin/get_keys`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: '34125' })
                });
                const data = await res.json();

                if (data.success) {
                    const list = document.getElementById('keysList');
                    list.innerHTML = '';
                    
                    data.keys.forEach(key => {
                        const div = document.createElement('div');
                        div.className = 'key-item';
                        div.innerHTML = `
                            <span>${key.key}</span>
                            <span class="key-status ${key.used ? 'status-used' : 'status-available'}">
                                ${key.used ? 'ИСПОЛЬЗОВАН' : 'ДОСТУПЕН'}
                            </span>
                        `;
                        list.appendChild(div);
                    });
                }
            } catch (e) {
                console.error('Failed to load keys');
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${SERVER}/api/admin/get_users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: '34125' })
                });
                const data = await res.json();

                if (data.success) {
                    const list = document.getElementById('usersList');
                    list.innerHTML = '';
                    
                    data.users.forEach(user => {
                        const div = document.createElement('div');
                        div.className = 'key-item';
                        div.innerHTML = `
                            <span>${user.username}</span>
                            <span style="color: #ffd700;">💰 ${user.balance}</span>
                        `;
                        list.appendChild(div);
                    });
                }
            } catch (e) {
                console.error('Failed to load users');
            }
        }

        function showNotification(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.style.background = type === 'success' ? '#5865F2' : '#ff4757';
            notif.innerText = text;
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }

        document.getElementById('keyType').addEventListener('change', function(e) {
            const balanceInput = document.getElementById('balanceInput');
            balanceInput.style.display = e.target.value === 'balance' ? 'block' : 'none';
        });
    </script>
</body>
</html>
