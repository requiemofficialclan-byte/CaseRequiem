<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | СТАБИЛЬНАЯ ВЕРСИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 20px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
        }

        .avatar {
            width: 30px;
            height: 30px;
            background: #00ffcc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
        }

        .case-selector {
            display: flex;
            gap: 30px;
            margin-top: 100px;
        }

        .case-card {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #333;
            cursor: pointer;
            transition: 0.3s;
            width: 250px;
            text-align: center;
        }

        .case-card:hover {
            border-color: #00ffcc;
            transform: translateY(-10px);
        }

        .case-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .main-container {
            display: none;
            width: 90%;
            max-width: 600px;
            margin-top: 30px;
            background: #111;
            padding: 30px;
            border-radius: 20px;
            position: relative;
        }

        .back-button {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .back-button:hover {
            border-color: #00ffcc;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid #333;
            color: white;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            margin: 20px 0;
            font-family: monospace;
        }

        input:focus {
            outline: none;
            border-color: #00ffcc;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #00ffcc;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            min-height: 40px;
        }

        .status.error { background: #ff4757; color: white; }
        .status.success { background: #00ffcc; color: black; }
        .status.warning { background: #ffaa00; color: black; }

        .roulette-wrapper {
            display: none;
            margin-top: 20px;
            position: relative;
            height: 160px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 10px;
            background: #000;
        }

        .selector {
            position: absolute;
            left: 50%;
            width: 4px;
            height: 100%;
            background: #ff4757;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #ff4757;
        }

        .tape {
            display: flex;
            position: absolute;
            left: 50%;
            transition: transform 8s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .item {
            width: 140px;
            height: 140px;
            margin: 0 5px;
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        #result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #1a1a1a;
            border: 2px solid #00ffcc;
            border-radius: 15px;
            text-align: center;
        }

        .admin-gear {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #333;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.3;
            transition: 0.3s;
        }

        .admin-gear:hover {
            opacity: 1;
            color: #00ffcc;
        }

        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .admin-container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #667eea;
        }

        .admin-btn {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #333;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .admin-btn:hover {
            background: #667eea;
        }

        .timer {
            font-size: 14px;
            color: #ffaa00;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-profile" onclick="changeUsername()">
            <div class="avatar" id="avatar">?</div>
            <span id="username">username</span>
        </div>
        <div id="serverStatus">🔄</div>
    </div>

    <!-- Главное меню -->
    <div id="mainMenu">
        <h1 style="text-align:center; margin-top:50px;">ВЫБЕРИТЕ КЕЙС</h1>
        <div class="case-selector">
            <div class="case-card" onclick="selectCase('spring')">
                <img src="https://cdn-icons-png.flaticon.com/512/2850/2850906.png">
                <h3>ВЕСЕННИЙ</h3>
            </div>
            <div class="case-card" onclick="selectCase('winter')">
                <img src="https://cdn-icons-png.flaticon.com/512/2322/2322731.png">
                <h3>ЗИМНИЙ</h3>
            </div>
        </div>
    </div>

    <!-- Экран кейса -->
    <div class="main-container" id="caseScreen">
        <button class="back-button" onclick="goBack()">← НАЗАД</button>
        
        <h2 id="caseTitle" style="margin-top:20px;">КЕЙС</h2>
        <img id="caseImage" style="width:100px; height:100px; border-radius:50%; margin:10px 0;">
        
        <input type="text" id="keyInput" placeholder="ВВЕДИТЕ КЛЮЧ" autocomplete="off">
        
        <div class="status" id="status"></div>
        
        <button class="btn" id="mainBtn" onclick="startSpin()">АКТИВИРОВАТЬ</button>

        <div class="roulette-wrapper" id="roulette">
            <div class="selector"></div>
            <div class="tape" id="tape"></div>
        </div>

        <div id="result">
            <h2 id="winName"></h2>
            <p id="winRarity"></p>
            <button class="btn" onclick="resetToMenu()" style="margin-top:15px;">ЗАВЕРШИТЬ</button>
        </div>
    </div>

    <button class="admin-gear" onclick="openAdmin()">⚙️</button>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-container">
            <h2 style="text-align:center; margin-bottom:20px;">ADMIN PANEL</h2>
            <button class="admin-btn" onclick="createKey('spring')">🌱 СОЗДАТЬ ВЕСЕННИЙ КЛЮЧ</button>
            <button class="admin-btn" onclick="createKey('winter')">❄️ СОЗДАТЬ ЗИМНИЙ КЛЮЧ</button>
            <div id="newKey" style="margin-top:15px; padding:10px; background:#111; border-radius:5px; word-break:break-all;"></div>
            <button class="admin-btn" onclick="closeAdmin()" style="margin-top:15px; background:#ff4757;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        const ADMIN_PASS = "1337";
        
        let username = localStorage.getItem('username') || 'гость';
        let caseType = '';
        let isSpinning = false;
        let currentKey = '';
        let pendingTimer = null;
        let spinTimer = null;

        const items = {
            spring: [
                { name: "Storm Bringer", img: "https://cdn-icons-png.flaticon.com/512/1146/1146869.png", rarity: "Легендарный", color: "#ffae00", chance: 1 },
                { name: "Grass Blade", img: "https://cdn-icons-png.flaticon.com/512/2850/2850906.png", rarity: "Обычный", color: "#aaa", chance: 49 },
                { name: "Spring Flower", img: "https://cdn-icons-png.flaticon.com/512/2936/2936890.png", rarity: "Редкий", color: "#4caf50", chance: 30 },
                { name: "Butterfly Wing", img: "https://cdn-icons-png.flaticon.com/512/3095/3095256.png", rarity: "Эпический", color: "#9c27b0", chance: 20 }
            ],
            winter: [
                { name: "Ice King Sword", img: "https://cdn-icons-png.flaticon.com/512/2322/2322731.png", rarity: "Легендарный", color: "#ffae00", chance: 1 },
                { name: "Snowball", img: "https://cdn-icons-png.flaticon.com/512/2334/2334861.png", rarity: "Обычный", color: "#aaa", chance: 49 },
                { name: "Frost Cape", img: "https://cdn-icons-png.flaticon.com/512/2936/2936845.png", rarity: "Редкий", color: "#2196f3", chance: 30 },
                { name: "Reindeer Horns", img: "https://cdn-icons-png.flaticon.com/512/2936/2936875.png", rarity: "Эпический", color: "#9c27b0", chance: 20 }
            ]
        };

        // Инициализация
        window.onload = () => {
            document.getElementById('avatar').innerText = username[0].toUpperCase();
            document.getElementById('username').innerText = '@' + username;
            checkServer();
        };

        function changeUsername() {
            let newName = prompt('Введите ваш Discord username (без @):');
            if (newName) {
                username = newName.toLowerCase().trim();
                localStorage.setItem('username', username);
                document.getElementById('avatar').innerText = username[0].toUpperCase();
                document.getElementById('username').innerText = '@' + username;
            }
        }

        async function checkServer() {
            try {
                await fetch(`${API_URL}/api/cleanup_pending`, { method: 'POST' });
                document.getElementById('serverStatus').innerHTML = '✅ ONLINE';
                document.getElementById('serverStatus').style.color = '#00ff00';
            } catch {
                document.getElementById('serverStatus').innerHTML = '❌ OFFLINE';
                document.getElementById('serverStatus').style.color = '#ff4757';
            }
        }

        function selectCase(type) {
            caseType = type;
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('caseScreen').style.display = 'block';
            
            if (type === 'winter') {
                document.getElementById('caseTitle').innerText = '❄️ ЗИМНИЙ КЕЙС';
                document.getElementById('caseImage').src = 'https://cdn-icons-png.flaticon.com/512/2322/2322731.png';
            } else {
                document.getElementById('caseTitle').innerText = '🌱 ВЕСЕННИЙ КЕЙС';
                document.getElementById('caseImage').src = 'https://cdn-icons-png.flaticon.com/512/2850/2850906.png';
            }
            
            document.getElementById('keyInput').value = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('status').className = 'status';
        }

        function goBack() {
            if (isSpinning) {
                if (!confirm('Открытие в процессе. Прервать?')) return;
                clearTimers();
            }
            releaseKey();
            resetUI();
            document.getElementById('mainMenu').style.display = 'block';
            document.getElementById('caseScreen').style.display = 'none';
        }

        function resetToMenu() {
            clearTimers();
            releaseKey();
            resetUI();
            document.getElementById('mainMenu').style.display = 'block';
            document.getElementById('caseScreen').style.display = 'none';
        }

        function resetUI() {
            isSpinning = false;
            document.getElementById('roulette').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('keyInput').disabled = false;
        }

        function clearTimers() {
            if (pendingTimer) {
                clearInterval(pendingTimer);
                pendingTimer = null;
            }
            if (spinTimer) {
                clearTimeout(spinTimer);
                spinTimer = null;
            }
        }

        async function releaseKey() {
            if (currentKey) {
                try {
                    await fetch(`${API_URL}/api/release_key`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ key: currentKey })
                    });
                } catch {}
                currentKey = '';
            }
        }

        // ОСНОВНАЯ ФУНКЦИЯ
        async function startSpin() {
            if (isSpinning) return;
            
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) {
                showStatus('Введите ключ', 'error');
                return;
            }

            // Блокируем интерфейс
            isSpinning = true;
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('keyInput').disabled = true;
            showStatus('Проверка ключа...', 'warning');

            try {
                // Проверяем ключ на сервере
                const response = await fetch(`${API_URL}/api/check_key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        key: key,
                        username: username
                    })
                });
                
                const data = await response.json();
                
                if (!data.valid) {
                    showStatus(data.reason || 'Ошибка', 'error');
                    isSpinning = false;
                    document.getElementById('mainBtn').disabled = false;
                    document.getElementById('keyInput').disabled = false;
                    return;
                }

                // Ключ заблокирован, запоминаем его
                currentKey = key;
                showStatus('✅ Ключ принят! Запуск...', 'success');

                // Запускаем рулетку
                startRoulette(key);

            } catch (error) {
                showStatus('Ошибка соединения с сервером', 'error');
                isSpinning = false;
                document.getElementById('mainBtn').disabled = false;
                document.getElementById('keyInput').disabled = false;
            }
        }

        function startRoulette(key) {
            // Скрываем поле ввода
            document.getElementById('setup').style.display = 'none';
            document.getElementById('roulette').style.display = 'block';

            // Создаем ленту
            const pool = items[caseType];
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            
            for (let i = 0; i < 30; i++) {
                for (let j = 0; j < pool.length; j++) {
                    let it = pool[j];
                    tape.innerHTML += `<div class="item" style="border-color:${it.color}"><img src="${it.img}"></div>`;
                }
            }

            // Выбираем выигрыш
            let r = Math.random() * 100;
            let cumulative = 0;
            let winItem = pool[0];
            
            for (let item of pool) {
                cumulative += item.chance;
                if (r <= cumulative) {
                    winItem = item;
                    break;
                }
            }

            // Подменяем выигрышный элемент
            const blocks = tape.getElementsByClassName('item');
            const winPos = 45;
            if (blocks[winPos]) {
                blocks[winPos].innerHTML = `<img src="${winItem.img}">`;
                blocks[winPos].style.borderColor = winItem.color;
                blocks[winPos].style.background = 'rgba(255,215,0,0.2)';
            }

            // Запускаем анимацию
            setTimeout(() => {
                const container = document.querySelector('.roulette-wrapper');
                const itemWidth = 150;
                const target = (winPos * itemWidth) - (container.offsetWidth / 2) + 75;
                tape.style.transform = `translateX(-${target}px)`;
            }, 200);

            // Показываем результат
            spinTimer = setTimeout(async () => {
                document.getElementById('winName').innerText = winItem.name;
                document.getElementById('winRarity').innerText = winItem.rarity;
                document.getElementById('winRarity').style.color = winItem.color;
                document.getElementById('result').style.display = 'block';

                // Активируем ключ на сервере
                try {
                    await fetch(`${API_URL}/api/activate_key`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            key: key,
                            username: username,
                            win_item: winItem.name
                        })
                    });
                } catch {}

                currentKey = '';
                isSpinning = false;
            }, 8500);
        }

        function showStatus(text, type) {
            const status = document.getElementById('status');
            status.innerHTML = text;
            status.className = 'status ' + type;
        }

        // Админ функции
        async function openAdmin() {
            const pass = prompt('Пароль админа:');
            if (pass === ADMIN_PASS) {
                document.getElementById('adminPanel').style.display = 'flex';
            }
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        async function createKey(type) {
            try {
                const response = await fetch(`${API_URL}/api/create_key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_pass: ADMIN_PASS,
                        key_type: type
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('newKey').innerHTML = 
                        `✅ Новый ключ:<br><strong>${data.key}</strong>`;
                }
            } catch {}
        }

        // Освобождаем ключ при закрытии вкладки
        window.addEventListener('beforeunload', () => {
            if (currentKey) {
                navigator.sendBeacon(`${API_URL}/api/release_key`, 
                    JSON.stringify({ key: currentKey }));
            }
        });
    </script>
</body>
</html>
