<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | СЕЗОННЫЕ КЕЙСЫ 2025-2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        /* Шапка */
        .header {
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .balance-card {
            background: #1a1a1a;
            padding: 10px 25px;
            border-radius: 40px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .balance-icon {
            font-size: 24px;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .profile:hover {
            border-color: #00ffcc;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #00ffcc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
        }

        /* Ввод ключа */
        .key-section {
            background: #1a1a1a;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            min-width: 300px;
            border: 1px solid #333;
        }

        .key-input {
            background: #0a0a0a;
            border: 2px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            width: 250px;
            font-family: monospace;
            font-size: 14px;
            transition: 0.3s;
        }

        .key-input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .use-key-btn {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .use-key-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        /* Контейнер */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 3em;
            background: linear-gradient(45deg, #00ffcc, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 50px;
            font-size: 1.2em;
        }

        /* Кейсы */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .case-card {
            background: #111;
            border: 2px solid #333;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .case-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .case-card:hover::before {
            animation: shine 1s;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .case-card:hover {
            transform: translateY(-10px);
            border-color: var(--case-color, #00ffcc);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }

        .case-icon {
            width: 120px;
            height: 120px;
            background: #1a1a1a;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            border: 3px solid var(--case-color, #00ffcc);
            transition: 0.3s;
        }

        .case-card:hover .case-icon {
            transform: scale(1.1);
        }

        .case-name {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .case-price {
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 15px 0;
            color: #ffd700;
            font-weight: bold;
            border: 1px solid #ffd700;
        }

        .items-preview {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .preview-item {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px solid #333;
        }

        .open-case-btn {
            background: var(--case-color, #00ffcc);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .open-case-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--case-color);
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 600px;
            border: 2px solid var(--case-color, #00ffcc);
            animation: modalPop 0.3s;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .roulette {
            position: relative;
            height: 150px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 15px;
            margin: 30px 0;
            background: #000;
        }

        .roulette-items {
            display: flex;
            position: absolute;
            left: 50%;
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .roulette-item {
            width: 120px;
            height: 120px;
            margin: 15px 5px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .selector {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #ff4757;
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 0 0 20px #ff4757;
        }

        .result {
            text-align: center;
            padding: 30px;
            background: #1a1a1a;
            border-radius: 20px;
            margin-top: 20px;
            border: 2px solid var(--case-color, #00ffcc);
            animation: popIn 0.5s;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .win-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .win-name {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .win-rarity {
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* Админка */
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #333;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.3;
            z-index: 100;
            transition: 0.3s;
        }

        .admin-btn:hover {
            opacity: 1;
            background: #ff4757;
            transform: rotate(90deg);
        }

        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .admin-panel.active {
            display: flex;
        }

        .admin-content {
            background: #111;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #ff4757;
        }

        .admin-section {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
        }

        .admin-input, .admin-select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
        }

        .admin-btn-small {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }

        .key-display {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 18px;
            word-break: break-all;
            margin: 15px 0;
            border: 1px solid #00ffcc;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            border-radius: 15px;
            animation: slideIn 0.3s;
            z-index: 3000;
            display: none;
            font-weight: bold;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="header">
        <div class="user-info">
            <div class="balance-card">
                <span class="balance-icon">💰</span>
                <span class="balance-amount" id="balance">0</span>
            </div>
            <div class="profile" onclick="changeUser()">
                <div class="avatar" id="avatar">?</div>
                <span id="username">гость</span>
            </div>
        </div>
        
        <!-- Ввод ключа -->
        <div class="key-section">
            <input type="text" class="key-input" id="keyInput" placeholder="ВВЕДИТЕ КЛЮЧ" autocomplete="off">
            <button class="use-key-btn" onclick="useKey()">Активировать</button>
        </div>
    </div>

    <!-- Кейсы -->
    <div class="container">
        <h1>🎲 СЕЗОННЫЕ КЕЙСЫ</h1>
        <div class="subtitle">❄️ ЗИМА 2025 • 🌱 ВЕСНА 2026 • ☀️ ЛЕТО 2026 • 🍂 ОСЕНЬ 2026</div>
        <div class="cases-grid" id="casesGrid"></div>
    </div>

    <!-- Модалка кейса -->
    <div class="modal" id="caseModal">
        <div class="modal-content" id="modalContent">
            <h2 id="modalCaseName" style="text-align: center; margin-bottom: 20px;"></h2>
            
            <div class="roulette">
                <div class="selector"></div>
                <div class="roulette-items" id="rouletteItems"></div>
            </div>

            <button class="open-case-btn" id="openCaseBtn" onclick="openCase()">Открыть за 2 💰</button>
            <button class="open-case-btn" onclick="closeModal()" style="background: #333; color: white; margin-top: 10px;">Закрыть</button>

            <div class="result" id="result" style="display: none;">
                <div class="win-icon" id="winIcon">🎁</div>
                <div class="win-name" id="winName"></div>
                <div class="win-rarity" id="winRarity"></div>
                <button class="open-case-btn" onclick="closeResult()" style="background: #00ffcc;">Продолжить</button>
            </div>
        </div>
    </div>

    <!-- Админка -->
    <button class="admin-btn" onclick="openAdmin()">⚙️</button>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <h2 style="text-align: center; margin-bottom: 30px;">⚡ ADMIN PANEL</h2>
            
            <div class="admin-section">
                <h3>💰 Ключ на баланс</h3>
                <input type="number" class="admin-input" id="balanceValue" placeholder="Сумма" value="10">
                <button class="admin-btn-small" onclick="createBalanceKey()">Создать ключ</button>
            </div>

            <div class="admin-section">
                <h3>🎲 Ключ на кейс</h3>
                <select class="admin-select" id="caseType">
                    <option value="winter2025">❄️ ЗИМА 2025</option>
                    <option value="spring2026">🌱 ВЕСНА 2026</option>
                    <option value="summer2026">☀️ ЛЕТО 2026</option>
                    <option value="autumn2026">🍂 ОСЕНЬ 2026</option>
                </select>
                <button class="admin-btn-small" onclick="createCaseKey()">Создать ключ</button>
            </div>

            <div class="admin-section" id="keyDisplay" style="display: none;">
                <h3>✅ Новый ключ:</h3>
                <div class="key-display" id="newKey"></div>
                <button class="admin-btn-small" onclick="copyKey()">Копировать</button>
            </div>

            <div class="admin-section">
                <h3>📊 Статистика</h3>
                <div id="stats"></div>
            </div>

            <button class="admin-btn-small" onclick="closeAdmin()" style="background: #ff4757; width: 100%;">Закрыть</button>
        </div>
    </div>

    <!-- Уведомления -->
    <div class="notification" id="notification"></div>

    <script>
        const SERVER = 'http://localhost:5000';
        const ADMIN_PASS = '1337';
        
        let currentUser = localStorage.getItem('username') || 'гость';
        let balance = 0;
        let currentCase = null;
        let isSpinning = false;
        let lastCreatedKey = '';
        let cases = [];

        // ============ ЗАГРУЗКА ============
        window.onload = () => {
            updateUserDisplay();
            loadUserBalance();
            loadCases();
        };

        async function loadUserBalance() {
            try {
                const response = await fetch(`${SERVER}/api/user/get`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser })
                });
                const data = await response.json();
                balance = data.balance;
                document.getElementById('balance').innerText = balance;
            } catch (e) {
                showNotif('❌ Сервер не доступен', 'error');
            }
        }

        async function loadCases() {
            try {
                const response = await fetch(`${SERVER}/api/cases/all`);
                const data = await response.json();
                cases = data.cases;
                renderCases();
            } catch (e) {
                console.error('Failed to load cases:', e);
            }
        }

        // ============ ПОЛЬЗОВАТЕЛЬ ============
        function changeUser() {
            let name = prompt('Введите ваш username:');
            if (name) {
                currentUser = name.toLowerCase().trim();
                localStorage.setItem('username', currentUser);
                updateUserDisplay();
                loadUserBalance();
            }
        }

        function updateUserDisplay() {
            document.getElementById('username').innerText = currentUser;
            document.getElementById('avatar').innerText = currentUser[0].toUpperCase();
        }

        // ============ КЕЙСЫ ============
        function renderCases() {
            const grid = document.getElementById('casesGrid');
            grid.innerHTML = '';
            
            cases.forEach(c => {
                const card = document.createElement('div');
                card.className = 'case-card';
                card.style.setProperty('--case-color', c.color);
                
                // Превью предметов
                const previewItems = c.items.slice(0, 4).map(item => 
                    `<div class="preview-item" title="${item.name}">${item.icon}</div>`
                ).join('');
                
                card.innerHTML = `
                    <div class="case-icon" style="border-color: ${c.color}">${c.icon}</div>
                    <div class="case-name">${c.name}</div>
                    <div class="case-price">💰 ${c.price}</div>
                    <div class="items-preview">${previewItems}</div>
                    <button class="open-case-btn" style="background: ${c.color}" 
                            onclick="openCaseModal('${c.id}')">ОТКРЫТЬ</button>
                `;
                
                grid.appendChild(card);
            });
        }

        function openCaseModal(caseId) {
            if (balance < 2) {
                showNotif('❌ Недостаточно монет! Используйте ключ на баланс', 'error');
                return;
            }
            
            currentCase = cases.find(c => c.id === caseId);
            document.getElementById('modalCaseName').innerText = currentCase.name;
            document.getElementById('modalContent').style.setProperty('--case-color', currentCase.color);
            document.getElementById('caseModal').classList.add('active');
        }

        // ============ КЛЮЧИ ============
        async function useKey() {
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) {
                showNotif('❌ Введите ключ', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER}/api/key/use`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        key: key,
                        username: currentUser
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showNotif(data.message, 'success');
                    
                    if (data.type === 'balance') {
                        balance += data.value;
                        document.getElementById('balance').innerText = balance;
                    } else if (data.type === 'case') {
                        // Открываем кейс по ключу
                        openCaseWithKey(data.case_type);
                    }
                    
                    document.getElementById('keyInput').value = '';
                } else {
                    showNotif(data.message, 'error');
                }
            } catch (e) {
                showNotif('❌ Ошибка сервера', 'error');
            }
        }

        function openCaseWithKey(caseType) {
            currentCase = cases.find(c => c.id === caseType);
            if (!currentCase) {
                showNotif('❌ Кейс не найден', 'error');
                return;
            }
            
            document.getElementById('modalCaseName').innerText = currentCase.name;
            document.getElementById('modalContent').style.setProperty('--case-color', currentCase.color);
            document.getElementById('caseModal').classList.add('active');
            setTimeout(() => openCase(true), 500);
        }

        // ============ ОТКРЫТИЕ КЕЙСА ============
        async function openCase(isFromKey = false) {
            if (isSpinning) return;

            if (!isFromKey) {
                if (balance < 2) {
                    showNotif('❌ Недостаточно монет', 'error');
                    closeModal();
                    return;
                }
                balance -= 2;
                document.getElementById('balance').innerText = balance;
            }

            isSpinning = true;
            document.getElementById('openCaseBtn').disabled = true;

            // Создаем рулетку
            const roulette = document.getElementById('rouletteItems');
            roulette.innerHTML = '';
            
            // Добавляем предметы в рулетку (много для анимации)
            for (let i = 0; i < 20; i++) {
                for (let j = 0; j < currentCase.items.length; j++) {
                    const item = currentCase.items[j];
                    roulette.innerHTML += `<div class="roulette-item">${item.icon}</div>`;
                }
            }

            // Выбираем выигрыш по шансам
            let r = Math.random() * 100;
            let cumulative = 0;
            let winItem = currentCase.items[0];
            
            for (let item of currentCase.items) {
                cumulative += item.chance;
                if (r <= cumulative) {
                    winItem = item;
                    break;
                }
            }

            // Запускаем анимацию
            setTimeout(() => {
                roulette.style.transform = `translateX(-${45 * 130}px)`;
            }, 100);

            // Показываем результат
            setTimeout(() => {
                document.getElementById('winIcon').innerText = winItem.icon;
                document.getElementById('winName').innerText = winItem.name;
                document.getElementById('winRarity').innerText = winItem.rarity;
                document.getElementById('result').style.display = 'block';
                
                isSpinning = false;
            }, 5100);
        }

        function closeModal() {
            document.getElementById('caseModal').classList.remove('active');
            document.getElementById('result').style.display = 'none';
            document.getElementById('rouletteItems').innerHTML = '';
            document.getElementById('openCaseBtn').disabled = false;
        }

        function closeResult() {
            document.getElementById('result').style.display = 'none';
            closeModal();
        }

        // ============ АДМИНКА ============
        function openAdmin() {
            document.getElementById('adminPanel').classList.add('active');
            loadAdminStats();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('keyDisplay').style.display = 'none';
        }

        async function createBalanceKey() {
            const value = document.getElementById('balanceValue').value;
            
            const response = await fetch(`${SERVER}/api/admin/create_key`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password: ADMIN_PASS,
                    admin_name: currentUser,
                    key_type: 'balance',
                    value: parseInt(value)
                })
            });

            const data = await response.json();
            if (data.success) {
                lastCreatedKey = data.key;
                document.getElementById('newKey').innerText = data.key;
                document.getElementById('keyDisplay').style.display = 'block';
                showNotif('✅ Ключ создан!', 'success');
                loadAdminStats();
            }
        }

        async function createCaseKey() {
            const caseType = document.getElementById('caseType').value;
            
            const response = await fetch(`${SERVER}/api/admin/create_key`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password: ADMIN_PASS,
                    admin_name: currentUser,
                    key_type: 'case',
                    case_type: caseType
                })
            });

            const data = await response.json();
            if (data.success) {
                lastCreatedKey = data.key;
                document.getElementById('newKey').innerText = data.key;
                document.getElementById('keyDisplay').style.display = 'block';
                showNotif('✅ Ключ создан!', 'success');
                loadAdminStats();
            }
        }

        async function loadAdminStats() {
            try {
                const response = await fetch(`${SERVER}/api/admin/stats`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASS })
                });

                const data = await response.json();
                if (data.success) {
                    document.getElementById('stats').innerHTML = `
                        <p>📊 Доступно ключей: ${data.available}</p>
                        <p>📊 Использовано: ${data.used}</p>
                        <p>👥 Всего пользователей: ${data.top_users.length}</p>
                    `;
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        function copyKey() {
            navigator.clipboard.writeText(lastCreatedKey);
            showNotif('✅ Ключ скопирован!');
        }

        // ============ УВЕДОМЛЕНИЯ ============
        function showNotif(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.style.background = type === 'success' ? '#00ffcc' : '#ff4757';
            notif.style.color = type === 'success' ? 'black' : 'white';
            notif.innerText = text;
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
