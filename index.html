<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | СЕЗОННАЯ СИСТЕМА</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            background: #111;
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .balance-card {
            background: #1a1a1a;
            padding: 10px 25px;
            border-radius: 40px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance-icon {
            font-size: 24px;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #00ffcc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
        }

        .season-badge {
            background: #333;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* Ввод ключа */
        .key-section {
            background: #1a1a1a;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            min-width: 300px;
        }

        .key-input {
            background: #0a0a0a;
            border: 2px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            width: 250px;
            font-family: monospace;
            font-size: 14px;
        }

        .key-input:focus {
            outline: none;
            border-color: #00ffcc;
        }

        .use-key-btn {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .use-key-btn:hover {
            transform: scale(1.05);
        }

        /* Контейнер */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            margin-bottom: 30px;
            font-size: 2em;
            text-align: center;
        }

        /* Кейсы */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .case-card {
            background: #111;
            border: 2px solid #333;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            position: relative;
        }

        .case-card.available {
            border-color: #00ffcc;
        }

        .case-card.unavailable {
            opacity: 0.5;
            filter: grayscale(0.5);
        }

        .case-card.unavailable:hover {
            transform: none;
            border-color: #333;
        }

        .season-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #333;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .case-icon {
            width: 120px;
            height: 120px;
            background: #1a1a1a;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            border: 3px solid currentColor;
        }

        .case-name {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .case-price {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 20px;
            display: inline-block;
            margin: 15px 0;
            color: #ffd700;
        }

        .open-case-btn {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
        }

        .open-case-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #666;
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 600px;
            border: 2px solid #00ffcc;
        }

        .roulette {
            position: relative;
            height: 150px;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 15px;
            margin: 30px 0;
            background: #000;
        }

        .roulette-items {
            display: flex;
            position: absolute;
            left: 50%;
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .roulette-item {
            width: 120px;
            height: 120px;
            margin: 15px 5px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .selector {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: #ff4757;
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 0 0 10px #ff4757;
        }

        .result {
            text-align: center;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid #00ffcc;
        }

        /* Админка */
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #333;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.3;
            z-index: 100;
        }

        .admin-btn:hover {
            opacity: 1;
            background: #ff4757;
        }

        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .admin-panel.active {
            display: flex;
        }

        .admin-content {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .admin-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .admin-input, .admin-select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
        }

        .admin-btn-small {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }

        .key-display {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            word-break: break-all;
            margin: 10px 0;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            animation: slideIn 0.3s;
            z-index: 3000;
            display: none;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .log-item {
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="header">
        <div class="user-info">
            <div class="balance-card">
                <span class="balance-icon">💰</span>
                <span class="balance-amount" id="balance">0</span>
            </div>
            <div class="profile" onclick="changeUser()">
                <div class="avatar" id="avatar">?</div>
                <span id="username">гость</span>
            </div>
            <div class="season-badge" id="seasonDisplay">Сезон: 🌱</div>
        </div>
        
        <!-- Ввод ключа -->
        <div class="key-section">
            <input type="text" class="key-input" id="keyInput" placeholder="ВВЕДИТЕ КЛЮЧ" autocomplete="off">
            <button class="use-key-btn" onclick="useKey()">Активировать</button>
        </div>
    </div>

    <!-- Кейсы -->
    <div class="container">
        <h2>🎲 ДОСТУПНЫЕ КЕЙСЫ</h2>
        <div class="cases-grid" id="casesGrid"></div>
    </div>

    <!-- Модалка кейса -->
    <div class="modal" id="caseModal">
        <div class="modal-content">
            <h2 id="modalCaseName" style="text-align: center;"></h2>
            
            <div class="roulette">
                <div class="selector"></div>
                <div class="roulette-items" id="rouletteItems"></div>
            </div>

            <button class="open-case-btn" id="openCaseBtn" onclick="openCase()">Открыть за 2 💰</button>
            <button class="open-case-btn" onclick="closeModal()" style="background: #333; color: white; margin-top: 10px;">Закрыть</button>

            <div class="result" id="result" style="display: none;">
                <div style="font-size: 50px;" id="winIcon">🎁</div>
                <h3 id="winName"></h3>
                <p id="winRarity"></p>
                <button class="open-case-btn" onclick="closeResult()">Продолжить</button>
            </div>
        </div>
    </div>

    <!-- Админка -->
    <button class="admin-btn" onclick="openAdmin()">⚙️</button>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <h2 style="text-align: center; margin-bottom: 20px;">⚡ ADMIN PANEL</h2>
            
            <div class="admin-section">
                <h3>💰 Ключ на баланс</h3>
                <input type="number" class="admin-input" id="balanceValue" placeholder="Сумма" value="10">
                <button class="admin-btn-small" onclick="createBalanceKey()">Создать ключ</button>
            </div>

            <div class="admin-section">
                <h3>🎲 Ключ на кейс</h3>
                <select class="admin-select" id="caseType">
                    <option value="winter">❄️ Зимний (только зимой)</option>
                    <option value="spring">🌱 Весенний (только весной)</option>
                </select>
                <select class="admin-select" id="caseSeason">
                    <option value="winter">❄️ Сезон: Зима</option>
                    <option value="spring">🌱 Сезон: Весна</option>
                    <option value="summer">☀️ Сезон: Лето</option>
                    <option value="autumn">🍂 Сезон: Осень</option>
                </select>
                <button class="admin-btn-small" onclick="createCaseKey()">Создать ключ</button>
            </div>

            <div class="admin-section" id="keyDisplay" style="display: none;">
                <h3>✅ Новый ключ:</h3>
                <div class="key-display" id="newKey"></div>
                <button class="admin-btn-small" onclick="copyKey()">Копировать</button>
            </div>

            <div class="admin-section">
                <h3>📊 Статистика</h3>
                <div id="stats"></div>
            </div>

            <div class="admin-section">
                <h3>📋 Последние логи</h3>
                <div id="logsList"></div>
            </div>

            <button class="admin-btn-small" onclick="closeAdmin()" style="background: #ff4757; width: 100%;">Закрыть</button>
        </div>
    </div>

    <!-- Уведомления -->
    <div class="notification" id="notification"></div>

    <script>
        const SERVER = 'http://localhost:5000';
        const ADMIN_PASS = '1337';
        
        let currentUser = localStorage.getItem('username') || 'гость';
        let balance = 0;
        let currentCase = null;
        let isSpinning = false;
        let lastCreatedKey = '';
        let cases = [];
        let currentSeason = 'spring';

        // ============ ЗАГРУЗКА ============
        window.onload = () => {
            updateUserDisplay();
            loadUserBalance();
            loadCases();
        };

        async function loadUserBalance() {
            try {
                const response = await fetch(`${SERVER}/api/user/get`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUser })
                });
                const data = await response.json();
                balance = data.balance;
                document.getElementById('balance').innerText = balance;
            } catch (e) {
                showNotif('❌ Сервер не доступен', 'error');
            }
        }

        async function loadCases() {
            try {
                const response = await fetch(`${SERVER}/api/cases/available`);
                const data = await response.json();
                cases = data.cases;
                currentSeason = data.current_season;
                
                document.getElementById('seasonDisplay').innerHTML = 
                    `Сезон: ${currentSeason === 'winter' ? '❄️ Зима' : 
                             currentSeason === 'spring' ? '🌱 Весна' : 
                             currentSeason === 'summer' ? '☀️ Лето' : '🍂 Осень'}`;
                
                renderCases();
            } catch (e) {
                console.error('Failed to load cases:', e);
            }
        }

        // ============ ПОЛЬЗОВАТЕЛЬ ============
        function changeUser() {
            let name = prompt('Введите ваш username:');
            if (name) {
                currentUser = name.toLowerCase().trim();
                localStorage.setItem('username', currentUser);
                updateUserDisplay();
                loadUserBalance();
            }
        }

        function updateUserDisplay() {
            document.getElementById('username').innerText = currentUser;
            document.getElementById('avatar').innerText = currentUser[0].toUpperCase();
        }

        // ============ КЕЙСЫ ============
        function renderCases() {
            const grid = document.getElementById('casesGrid');
            grid.innerHTML = '';
            
            cases.forEach(c => {
                const available = c.available;
                const card = document.createElement('div');
                card.className = `case-card ${available ? 'available' : 'unavailable'}`;
                
                card.innerHTML = `
                    <div class="season-tag">${c.season === 'winter' ? '❄️ Зима' : '🌱 Весна'}</div>
                    <div class="case-icon" style="border-color: ${available ? '#00ffcc' : '#666'}">${c.icon}</div>
                    <div class="case-name">${c.name}</div>
                    <div class="case-price">💰 ${c.price}</div>
                    <button class="open-case-btn" onclick="openCaseModal('${c.id}')" 
                            ${!available ? 'disabled' : ''}>
                        ${available ? 'ОТКРЫТЬ' : 'Недоступен'}
                    </button>
                `;
                
                grid.appendChild(card);
            });
        }

        function openCaseModal(caseId) {
            if (balance < 2) {
                showNotif('❌ Недостаточно монет! Используйте ключ на баланс', 'error');
                return;
            }
            
            currentCase = cases.find(c => c.id === caseId);
            if (!currentCase.available) {
                showNotif('❌ Этот кейс сейчас не доступен', 'error');
                return;
            }
            
            document.getElementById('modalCaseName').innerText = currentCase.name;
            document.getElementById('caseModal').classList.add('active');
        }

        // ============ КЛЮЧИ ============
        async function useKey() {
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) {
                showNotif('❌ Введите ключ', 'error');
                return;
            }

            try {
                const response = await fetch(`${SERVER}/api/key/use`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        key: key,
                        username: currentUser
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showNotif(data.message, 'success');
                    
                    if (data.type === 'balance') {
                        balance += data.value;
                        document.getElementById('balance').innerText = balance;
                    } else if (data.type === 'case') {
                        // Открываем кейс по ключу
                        openCaseWithKey(data.case_type);
                    }
                    
                    document.getElementById('keyInput').value = '';
                } else {
                    showNotif(data.message, 'error');
                }
            } catch (e) {
                showNotif('❌ Ошибка сервера', 'error');
            }
        }

        function openCaseWithKey(caseType) {
            currentCase = cases.find(c => c.id === caseType);
            if (!currentCase) {
                showNotif('❌ Кейс не найден', 'error');
                return;
            }
            
            if (!currentCase.available) {
                showNotif('❌ Этот кейс сейчас не в сезоне', 'error');
                return;
            }
            
            document.getElementById('modalCaseName').innerText = currentCase.name;
            document.getElementById('caseModal').classList.add('active');
            setTimeout(() => openCase(true), 500);
        }

        // ============ ОТКРЫТИЕ КЕЙСА ============
        async function openCase(isFromKey = false) {
            if (isSpinning) return;

            if (!isFromKey) {
                if (balance < 2) {
                    showNotif('❌ Недостаточно монет', 'error');
                    closeModal();
                    return;
                }
                balance -= 2;
                document.getElementById('balance').innerText = balance;
            }

            isSpinning = true;
            document.getElementById('openCaseBtn').disabled = true;

            // Создаем рулетку
            const roulette = document.getElementById('rouletteItems');
            roulette.innerHTML = '';
            
            // Добавляем предметы в рулетку (много для анимации)
            for (let i = 0; i < 20; i++) {
                for (let j = 0; j < currentCase.items.length; j++) {
                    const item = currentCase.items[j];
                    roulette.innerHTML += `<div class="roulette-item">${item.icon}</div>`;
                }
            }

            // Выбираем выигрыш по шансам
            let r = Math.random() * 100;
            let cumulative = 0;
            let winItem = currentCase.items[0];
            
            for (let item of currentCase.items) {
                cumulative += item.chance;
                if (r <= cumulative) {
                    winItem = item;
                    break;
                }
            }

            // Запускаем анимацию
            setTimeout(() => {
                roulette.style.transform = `translateX(-${45 * 130}px)`;
            }, 100);

            // Показываем результат
            setTimeout(() => {
                document.getElementById('winIcon').innerText = winItem.icon;
                document.getElementById('winName').innerText = winItem.name;
                document.getElementById('winRarity').innerText = winItem.rarity;
                document.getElementById('result').style.display = 'block';
                
                // Отправляем в Discord через сервер
                fetch(`${SERVER}/api/log`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'case_open',
                        username: currentUser,
                        details: `${currentCase.name} - ${winItem.name} (${winItem.rarity})`
                    })
                });
                
                isSpinning = false;
            }, 5100);
        }

        function closeModal() {
            document.getElementById('caseModal').classList.remove('active');
            document.getElementById('result').style.display = 'none';
            document.getElementById('rouletteItems').innerHTML = '';
            document.getElementById('openCaseBtn').disabled = false;
        }

        function closeResult() {
            document.getElementById('result').style.display = 'none';
            closeModal();
        }

        // ============ АДМИНКА ============
        function openAdmin() {
            document.getElementById('adminPanel').classList.add('active');
            loadAdminStats();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('keyDisplay').style.display = 'none';
        }

        async function createBalanceKey() {
            const value = document.getElementById('balanceValue').value;
            
            const response = await fetch(`${SERVER}/api/admin/create_key`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password: ADMIN_PASS,
                    admin_name: currentUser,
                    key_type: 'balance',
                    value: parseInt(value)
                })
            });

            const data = await response.json();
            if (data.success) {
                lastCreatedKey = data.key;
                document.getElementById('newKey').innerText = data.key;
                document.getElementById('keyDisplay').style.display = 'block';
                showNotif('✅ Ключ создан!', 'success');
                loadAdminStats();
            }
        }

        async function createCaseKey() {
            const caseType = document.getElementById('caseType').value;
            const season = document.getElementById('caseSeason').value;
            
            const response = await fetch(`${SERVER}/api/admin/create_key`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password: ADMIN_PASS,
                    admin_name: currentUser,
                    key_type: 'case',
                    case_type: caseType,
                    season: season
                })
            });

            const data = await response.json();
            if (data.success) {
                lastCreatedKey = data.key;
                document.getElementById('newKey').innerText = data.key;
                document.getElementById('keyDisplay').style.display = 'block';
                showNotif('✅ Ключ создан!', 'success');
                loadAdminStats();
            }
        }

        async function loadAdminStats() {
            try {
                const response = await fetch(`${SERVER}/api/admin/stats`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASS })
                });

                const data = await response.json();
                if (data.success) {
                    document.getElementById('stats').innerHTML = `
                        <p>📊 Доступно ключей: ${data.available}</p>
                        <p>📊 Использовано: ${data.used}</p>
                        <p>💰 Всего пользователей: ${data.top_users.length}</p>
                    `;
                    
                    // Показываем логи
                    let logsHtml = '';
                    data.recent_logs.forEach(log => {
                        logsHtml += `<div class="log-item">[${log[3]}] ${log[0]}: ${log[1]} - ${log[2]}</div>`;
                    });
                    document.getElementById('logsList').innerHTML = logsHtml || '<div class="log-item">Нет логов</div>';
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        function copyKey() {
            navigator.clipboard.writeText(lastCreatedKey);
            showNotif('✅ Ключ скопирован!');
        }

        // ============ УВЕДОМЛЕНИЯ ============
        function showNotif(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.style.background = type === 'success' ? '#00ffcc' : '#ff4757';
            notif.style.color = type === 'success' ? 'black' : 'white';
            notif.innerText = text;
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
