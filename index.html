<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | СЕЗОННАЯ СИСТЕМА</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            padding: 20px;
        }

        .header {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .balance {
            background: #1a1a1a;
            padding: 10px 25px;
            border-radius: 40px;
            border: 2px solid #ffd700;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .user {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        .key-section {
            display: flex;
            gap: 10px;
        }

        .key-input {
            background: #1a1a1a;
            border: 2px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            width: 250px;
        }

        .key-input:focus {
            outline: none;
            border-color: #00ffcc;
        }

        .btn {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .case-card {
            background: #111;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }

        .case-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .case-name {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .case-status {
            padding: 5px 10px;
            border-radius: 15px;
            display: inline-block;
            margin: 10px 0;
            font-size: 12px;
        }

        .status-current { background: #00ffcc; color: black; }
        .status-past { background: #666; color: white; }
        .status-future { background: #ffaa00; color: black; }

        .open-btn {
            background: var(--btn-color, #00ffcc);
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #333;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            background: #00ffcc;
            color: black;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance" id="balance">0 💰</div>
        <div class="user" onclick="changeUser()">
            <span id="username">гость</span>
        </div>
        <div class="key-section">
            <input type="text" class="key-input" id="keyInput" placeholder="ВВЕДИТЕ КЛЮЧ">
            <button class="btn" onclick="useKey()">Активировать</button>
        </div>
    </div>

    <h1 style="text-align: center; margin-bottom: 30px;">🎲 СЕЗОННЫЕ КЕЙСЫ</h1>
    <div id="seasonInfo" style="text-align: center; margin-bottom: 20px; color: #666;"></div>
    
    <div class="cases-grid" id="casesGrid"></div>

    <button class="admin-btn" onclick="openAdmin()">⚙️</button>
    <div class="notification" id="notification"></div>

    <script>
        const SERVER = 'http://localhost:5000';
        let currentUser = localStorage.getItem('username') || 'гость';
        let balance = parseInt(localStorage.getItem('balance')) || 0;

        window.onload = () => {
            document.getElementById('username').innerText = currentUser;
            document.getElementById('balance').innerText = balance + ' 💰';
            loadCases();
        };

        async function loadCases() {
            try {
                const response = await fetch(`${SERVER}/cases`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('seasonInfo').innerText = `Текущий сезон: ${data.current_season}`;
                    renderCases(data.cases);
                }
            } catch (e) {
                showNotif('❌ Сервер не отвечает', 'error');
            }
        }

        function renderCases(cases) {
            const grid = document.getElementById('casesGrid');
            grid.innerHTML = '';
            
            cases.forEach(c => {
                let statusClass = '';
                let statusText = '';
                
                if (!c.available_for_purchase && c.year < 2026) {
                    statusClass = 'status-past';
                    statusText = '🔑 ТОЛЬКО ПО КЛЮЧАМ';
                } else if (c.available_for_purchase) {
                    statusClass = 'status-current';
                    statusText = '✨ ТЕКУЩИЙ СЕЗОН';
                } else {
                    statusClass = 'status-future';
                    statusText = '⏳ СКОРО';
                }
                
                const card = document.createElement('div');
                card.className = 'case-card';
                card.innerHTML = `
                    <div class="case-icon">${c.icon}</div>
                    <div class="case-name">${c.name}</div>
                    <div class="case-status ${statusClass}">${statusText}</div>
                    <div style="margin: 15px 0; color: #ffd700;">💰 ${c.price}</div>
                    <button class="open-btn" 
                            style="--btn-color: ${c.color}"
                            onclick="openCase('${c.id}')"
                            ${!c.available_for_purchase ? 'disabled' : ''}>
                        ${c.available_for_purchase ? 'ОТКРЫТЬ' : 'НЕДОСТУПЕН'}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function changeUser() {
            let name = prompt('Ваш username:');
            if (name) {
                currentUser = name.toLowerCase().trim();
                localStorage.setItem('username', currentUser);
                document.getElementById('username').innerText = currentUser;
            }
        }

        async function useKey() {
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) return showNotif('❌ Введите ключ', 'error');

            try {
                const response = await fetch(`${SERVER}/key/use`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, username: currentUser })
                });

                const data = await response.json();
                
                if (data.success) {
                    if (data.type === 'balance') {
                        balance += data.value;
                        localStorage.setItem('balance', balance);
                        document.getElementById('balance').innerText = balance + ' 💰';
                        showNotif(`✅ +${data.value} монет!`);
                    } else {
                        showNotif('✅ Ключ активирован! Открывайте кейс!');
                    }
                    document.getElementById('keyInput').value = '';
                } else {
                    showNotif(data.message, 'error');
                }
            } catch (e) {
                showNotif('❌ Ошибка сервера', 'error');
            }
        }

        function openCase(caseId) {
            if (balance < 2) {
                return showNotif('❌ Нужно 2 монеты!', 'error');
            }
            
            balance -= 2;
            localStorage.setItem('balance', balance);
            document.getElementById('balance').innerText = balance + ' 💰';
            showNotif('✅ Кейс открыт! (тут должна быть анимация)');
        }

        function openAdmin() {
            let pass = prompt('Пароль админа:');
            if (pass === '1337') {
                window.location.href = 'admin.html';
            }
        }

        function showNotif(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.style.background = type === 'success' ? '#00ffcc' : '#ff4757';
            notif.style.color = type === 'success' ? 'black' : 'white';
            notif.innerText = text;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
