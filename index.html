<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            padding: 20px;
        }

        .header {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance {
            font-size: 24px;
            color: gold;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            background: #1a1a1a;
            padding: 8px 15px;
            border-radius: 20px;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .auth-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .key-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .key-input {
            flex: 1;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
        }

        .key-btn {
            padding: 12px 25px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .cases {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .case {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .case h3 {
            margin-bottom: 10px;
            color: var(--color);
        }

        .price {
            color: gold;
            font-size: 20px;
            margin: 15px 0;
        }

        .open-btn {
            background: var(--color);
            color: black;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
        }

        .modal h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
            color: #888;
        }

        .remember-me input {
            width: auto;
            margin: 0;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal-btn.secondary {
            background: #333;
        }

        .error {
            color: #ff4757;
            font-size: 14px;
            margin: 10px 0;
            display: none;
        }

        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #333;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 25px;
            background: #5865F2;
            color: white;
            border-radius: 8px;
            display: none;
        }

        /* Анимация */
        .animation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .animation-box {
            background: #111;
            border: 2px solid var(--color);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .animation-slots {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 30px 0;
        }

        .slot {
            width: 100px;
            height: 100px;
            background: #1a1a1a;
            border: 2px solid var(--color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: spin 0.2s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(360deg); }
        }

        .slot:nth-child(1) { animation-duration: 0.1s; }
        .slot:nth-child(2) { animation-duration: 0.15s; }
        .slot:nth-child(3) { animation-duration: 0.2s; }

        .animation-result {
            font-size: 24px;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance">💰 <span id="balance">0</span></div>
        
        <div class="user-panel" id="userPanel" style="display: none;">
            <span class="username" id="username"></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="auth-buttons" id="authButtons">
            <button class="auth-btn" onclick="showModal('login')">Войти</button>
            <button class="auth-btn" onclick="showModal('register')">Регистрация</button>
        </div>
    </div>

    <div class="key-section">
        <input type="text" class="key-input" id="keyInput" placeholder="ВВЕДИТЕ КЛЮЧ">
        <button class="key-btn" onclick="useKey()">Активировать</button>
    </div>

    <div class="cases" id="mainContent" style="display: none;">
        <div class="case" style="--color: #00d4ff">
            <h3>❄️ ЗИМНИЙ КЕЙС</h3>
            <div class="price">🔑 ПО КЛЮЧУ</div>
            <button class="open-btn" style="background: #00d4ff" disabled>ТОЛЬКО ПО КЛЮЧУ</button>
        </div>

        <div class="case" style="--color: #00ffcc">
            <h3>🌸 ВЕСЕННИЙ КЕЙС</h3>
            <div class="price">💰 55,000</div>
            <button class="open-btn" style="background: #00ffcc" onclick="openSpringCase()">ОТКРЫТЬ</button>
        </div>

        <div class="case" style="--color: #ff4757">
            <h3>🎲 РОЛЕВОЙ КЕЙС</h3>
            <div class="price">🔑 ПО КЛЮЧУ</div>
            <button class="open-btn" style="background: #ff4757" disabled>ТОЛЬКО ПО КЛЮЧУ</button>
        </div>
    </div>

    <!-- Модалка входа -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>🔐 ВХОД</h2>
            <input type="text" id="loginUsername" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            
            <label class="remember-me">
                <input type="checkbox" id="rememberMe" checked>
                <span>Запомнить меня</span>
            </label>

            <div class="error" id="loginError"></div>
            
            <button class="modal-btn" onclick="login()">Войти</button>
            <button class="modal-btn secondary" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <!-- Модалка регистрации -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h2>📝 РЕГИСТРАЦИЯ</h2>
            <input type="text" id="regUsername" placeholder="Логин">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="password" id="regConfirm" placeholder="Повторите пароль">
            <div class="error" id="registerError"></div>
            <button class="modal-btn" onclick="register()">Зарегистрироваться</button>
            <button class="modal-btn secondary" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <!-- Анимация открытия -->
    <div class="animation-overlay" id="animation">
        <div class="animation-box" id="animBox">
            <h2 id="animTitle">ОТКРЫТИЕ КЕЙСА</h2>
            <div class="animation-slots" id="slots">
                <div class="slot">🎲</div>
                <div class="slot">🎲</div>
                <div class="slot">🎲</div>
            </div>
            <div class="animation-result" id="animResult"></div>
        </div>
    </div>

    <button class="admin-btn" onclick="openAdmin()">⚙️</button>
    <div class="notification" id="notification"></div>

    <script>
        const SERVER = 'http://192.168.1.100:5000'; // ЗАМЕНИТЕ НА ВАШ IP
        const ADMIN_PASS = '34125';
        let currentUser = null;
        let balance = 0;

        // При загрузке страницы
        window.onload = function() {
            // Проверяем сохраненную сессию
            const savedSession = localStorage.getItem('clanSession');
            if (savedSession) {
                const session = JSON.parse(savedSession);
                currentUser = session.username;
                balance = session.balance;
                
                document.getElementById('authButtons').style.display = 'none';
                document.getElementById('userPanel').style.display = 'flex';
                document.getElementById('username').innerText = currentUser;
                document.getElementById('balance').innerText = balance;
                document.getElementById('mainContent').style.display = 'grid';
            }

            // Проверяем сохраненный логин
            const savedLogin = localStorage.getItem('savedLogin');
            if (savedLogin) {
                document.getElementById('loginUsername').value = savedLogin;
            }
        };

        function showModal(type) {
            closeModals();
            document.getElementById(type + 'Modal').classList.add('active');
        }

        function closeModals() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('registerModal').classList.remove('active');
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                document.getElementById('loginError').innerText = 'Заполните все поля';
                document.getElementById('loginError').style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${SERVER}/api/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();

                if (data.success) {
                    currentUser = username;
                    balance = data.balance;

                    // Сохраняем сессию
                    localStorage.setItem('clanSession', JSON.stringify({
                        username: currentUser,
                        balance: balance
                    }));

                    if (remember) {
                        localStorage.setItem('savedLogin', username);
                    } else {
                        localStorage.removeItem('savedLogin');
                    }

                    document.getElementById('authButtons').style.display = 'none';
                    document.getElementById('userPanel').style.display = 'flex';
                    document.getElementById('username').innerText = currentUser;
                    document.getElementById('balance').innerText = balance;
                    document.getElementById('mainContent').style.display = 'grid';

                    closeModals();
                    showNotification('✅ Успешный вход!');
                } else {
                    document.getElementById('loginError').innerText = data.message;
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                showNotification('❌ Ошибка соединения с сервером', 'error');
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (!username || !password || !confirm) {
                document.getElementById('registerError').innerText = 'Заполните все поля';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            if (password !== confirm) {
                document.getElementById('registerError').innerText = 'Пароли не совпадают';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${SERVER}/api/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();

                if (data.success) {
                    showNotification('✅ Регистрация успешна! Войдите');
                    closeModals();
                    showModal('login');
                } else {
                    document.getElementById('registerError').innerText = data.message;
                    document.getElementById('registerError').style.display = 'block';
                }
            } catch (error) {
                showNotification('❌ Ошибка соединения с сервером', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('clanSession');
            currentUser = null;
            balance = 0;
            
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userPanel').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
            
            showNotification('👋 Вы вышли');
        }

        async function useKey() {
            if (!currentUser) {
                showNotification('❌ Сначала войдите', 'error');
                return;
            }

            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) return;

            try {
                const res = await fetch(`${SERVER}/api/use_key`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({key, username: currentUser})
                });
                const data = await res.json();

                if (data.success) {
                    if (data.type === 'balance') {
                        balance = data.balance;
                        document.getElementById('balance').innerText = balance;
                        
                        const session = JSON.parse(localStorage.getItem('clanSession'));
                        session.balance = balance;
                        localStorage.setItem('clanSession', JSON.stringify(session));
                        
                        showNotification(`✅ +${data.value} монет!`);
                    } else if (data.type === 'winter') {
                        openWinterCase();
                    } else if (data.type === 'role') {
                        openRoleCase();
                    }
                    document.getElementById('keyInput').value = '';
                } else {
                    showNotification(data.message, 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка сервера', 'error');
            }
        }

        async function openSpringCase() {
            if (!currentUser) return;
            if (balance < 55000) {
                showNotification('❌ Нужно 55,000 монет', 'error');
                return;
            }

            const newBalance = balance - 55000;
            
            await fetch(`${SERVER}/api/update_balance`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: currentUser, balance: newBalance})
            });

            balance = newBalance;
            document.getElementById('balance').innerText = balance;
            
            const session = JSON.parse(localStorage.getItem('clanSession'));
            session.balance = balance;
            localStorage.setItem('clanSession', JSON.stringify(session));

            const items = ['FrostBolt', 'NeonCloud', 'AbyssalThunder'];
            const win = items[Math.floor(Math.random() * items.length)];
            
            startAnimation(win, '#00ffcc', '🌸 ВЕСЕННИЙ КЕЙС');
        }

        function openWinterCase() {
            const items = ['NY Limited', 'HOLIDAY', 'WINTER', 'Snow Reaper'];
            const win = items[Math.floor(Math.random() * items.length)];
            startAnimation(win, '#00d4ff', '❄️ ЗИМНИЙ КЕЙС');
        }

        function openRoleCase() {
            const items = ['Bloodbound', 'Shadow', 'Veteran', 'Eternal', 'Phantom', 'Chosen'];
            const win = items[Math.floor(Math.random() * items.length)];
            startAnimation(win, '#ff4757', '🎲 РОЛЕВОЙ КЕЙС');
        }

        function startAnimation(winItem, color, title) {
            const anim = document.getElementById('animation');
            const box = document.getElementById('animBox');
            const slots = document.querySelectorAll('.slot');
            const result = document.getElementById('animResult');
            const titleEl = document.getElementById('animTitle');

            box.style.setProperty('--color', color);
            titleEl.style.color = color;
            titleEl.innerText = title;

            const icons = ['❄️', '🌸', '🎲', '🎁', '⚔️', '👤'];
            slots.forEach(slot => {
                slot.innerText = icons[Math.floor(Math.random() * icons.length)];
            });

            anim.style.display = 'flex';
            result.style.display = 'none';

            setTimeout(() => {
                slots.forEach(slot => {
                    slot.style.animation = 'none';
                    slot.innerText = '🎁';
                });
            }, 2000);

            setTimeout(() => {
                result.innerText = `🎉 ${winItem} !`;
                result.style.display = 'block';
            }, 2500);

            setTimeout(() => {
                anim.style.display = 'none';
                slots.forEach(slot => {
                    slot.style.animation = '';
                });
            }, 4000);
        }

        function openAdmin() {
            const pass = prompt('Пароль админа:');
            if (pass === ADMIN_PASS) {
                let action = prompt('1 - Ключ на баланс\n2 - Ключ на зимний кейс\n3 - Ключ на ролевой кейс');
                
                if (action === '1') {
                    let amount = prompt('Сумма:', '1000');
                    alert(`✅ BAL-${amount}-${Math.floor(Math.random()*9000+1000)}`);
                } else if (action === '2') {
                    alert(`✅ WINTER-${Math.floor(Math.random()*9000+1000)}`);
                } else if (action === '3') {
                    alert(`✅ ROLE-${Math.floor(Math.random()*9000+1000)}`);
                }
            } else {
                showNotification('❌ Неверный пароль', 'error');
            }
        }

        function showNotification(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.style.background = type === 'success' ? '#5865F2' : '#ff4757';
            notif.innerText = text;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
