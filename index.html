<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan Case Palace</title>
    <style>
        :root { --main-color: #00ffcc; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; }
        .user-profile { display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 8px 15px; border-radius: 50px; border: 1px solid #333; }
        .avatar { width: 30px; height: 30px; background: var(--main-color); border-radius: 50%; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .main-container { text-align: center; margin-top: 50px; width: 90%; max-width: 600px; }
        .case-img { width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--main-color); box-shadow: 0 0 20px rgba(0,255,204,0.3); margin-bottom: 20px; }

        input { background: #222; border: 2px solid #444; color: white; padding: 15px; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 18px; text-align: center; margin-bottom: 15px; }
        input:focus { border-color: var(--main-color); outline: none; }

        .btn { background: var(--main-color); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }
        .btn:hover { background: #00d4aa; }

        /* Рулетка */
        .roulette-wrapper { position: relative; width: 100%; height: 140px; border: 2px solid #333; background: #111; overflow: hidden; border-radius: 15px; display: none; margin-top: 20px; }
        .selector { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: red; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 10px; transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1); }
        .item { width: 120px; height: 120px; margin: 0 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .item img { width: 100px; height: 100px; border-radius: 10px; }

        /* Админка (сделал заметнее) */
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 20px; opacity: 0.5; }
        .admin-btn:hover { opacity: 1; background: var(--main-color); color: black; }
        
        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 30px; border-radius: 20px; border: 2px solid var(--main-color); z-index: 1000; width: 300px; text-align: center; box-shadow: 0 0 100px #000; }
        .key-list { background: #000; padding: 10px; border-radius: 10px; margin-top: 15px; max-height: 150px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-profile">
            <div class="avatar" id="u-av">?</div>
            <span id="u-name">Гость</span>
        </div>
        <div style="font-size: 12px; color: #666;">[L] SPRING</div>
    </div>

    <div class="main-container">
        <h1 id="title">КЕЙС: STORM BRINGER 🌩️</h1>
        <img src="https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076" class="case-img">

        <div id="input-area">
            <input type="text" id="key-input" placeholder="ВСТАВЬТЕ ID КЛЮЧ">
            <button class="btn" onclick="openCase()">АКТИВИРОВАТЬ</button>
        </div>

        <div class="roulette-wrapper" id="roulette">
            <div class="selector"></div>
            <div class="tape" id="tape"></div>
        </div>

        <div id="result" style="display:none; margin-top: 20px; padding: 20px; border: 1px solid var(--main-color); border-radius: 10px;">
            <h2 id="win-text" style="color: var(--main-color);"></h2>
            <p>Код подтверждения (отправлен админу):</p>
            <code id="win-code" style="font-size: 20px; background: #000; padding: 5px 10px;"></code>
        </div>
    </div>

    <button class="admin-btn" onclick="adminAuth()">⚙️</button>

    <div id="admin-modal">
        <h3>🔐 ПАНЕЛЬ СОЗДАТЕЛЯ</h3>
        <button class="btn" onclick="genKey()">СОЗДАТЬ ID КЛЮЧ</button>
        <div class="key-list" id="keys-log">Ключей нет</div>
        <button onclick="closeAdmin()" style="margin-top:15px; background:none; color:gray; border:none; cursor:pointer;">Закрыть</button>
    </div>

    <script>
        const MY_PASS = "1337"; // Твой пароль
        const WEBHOOK = "ТВОЙ_ВЕБХУК_ТУТ"; // Вставь ссылку на вебхук сюда!

        const items = [
            { name: "Storm Bringer", img: "https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076" },
            { name: "Vortex Lord", img: "https://r.jina.ai/i/450b71ca7db94f6f81e646270b2be881" },
            { name: "Crystal Caster", img: "https://r.jina.ai/i/65022e389df04a439df68971f11a4325" }
        ];

        let userName = "Гость";

        window.onload = () => {
            let n = prompt("Ваш ник в Discord:");
            if(n) {
                userName = n;
                document.getElementById('u-name').innerText = n;
                document.getElementById('u-av').innerText = n[0].toUpperCase();
            }
        };

        function openCase() {
            const k = document.getElementById('key-input').value;
            if(k.length < 5) return alert("Введите верный ключ!");
            
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('roulette').style.display = 'block';
            
            const tape = document.getElementById('tape');
            for(let i=0; i<60; i++) {
                let it = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="item"><img src="${it.img}"></div>`;
            }

            setTimeout(() => {
                tape.style.transform = "translateX(-6500px)";
            }, 100);

            setTimeout(() => {
                const prize = items[Math.floor(Math.random()*items.length)];
                const code = "WIN-" + Math.random().toString(36).substr(2, 5).toUpperCase();
                document.getElementById('win-text').innerText = "ВЫПАЛО: " + prize.name;
                document.getElementById('win-code').innerText = code;
                document.getElementById('result').style.display = 'block';
                
                // Отправка лога
                if(WEBHOOK !== "ТВОЙ_ВЕБХУК_ТУТ") {
                    fetch(WEBHOOK, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            content: `📦 **${userName}** открыл кейс!\nКлюч: \`${k}\`\nПриз: **${prize.name}**\nКод: \`${code}\``
                        })
                    });
                }
            }, 5500);
        }

        function adminAuth() {
            if(prompt("Пароль:") === MY_PASS) document.getElementById('admin-modal').style.display = 'block';
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        
        function genKey() {
            const newK = Math.random().toString(36).substr(2, 10).toUpperCase();
            const log = document.getElementById('keys-log');
            if(log.innerText === "Ключей нет") log.innerText = "";
            log.innerHTML += `<div>ID: <b>${newK}</b></div>`;
            navigator.clipboard.writeText(newK);
            alert("Ключ скопирован: " + newK);
        }
    </script>
</body>
</html>
