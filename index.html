<script>
    // АВТОМАТИЧЕСКОЕ ОПРЕДЕЛЕНИЕ СЕРВЕРА
    const SERVER = (() => {
        // Если сайт на GitHub Pages
        if (window.location.hostname.includes('github.io')) {
            // ВАЖНО: ЗАМЕНИТЕ НА ВАШ ЛОКАЛЬНЫЙ IP!
            return 'http://192.168.1.100:5000';  // Узнайте ваш IP из консоли сервера
        }
        return 'http://localhost:5000';
    })();

    console.log('🔌 Подключаемся к серверу:', SERVER);

    // Функция для запросов с поддержкой CORS
    async function apiRequest(endpoint, options = {}) {
        const url = `${SERVER}${endpoint}`;
        const defaultOptions = {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            },
            mode: 'cors'
        };
        
        try {
            const response = await fetch(url, { ...defaultOptions, ...options });
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            showNotif('❌ Ошибка соединения с сервером. Убедитесь, что сервер запущен на ПК', 'error');
            return null;
        }
    }

    // Проверка авторизации
    async function checkAuth() {
        try {
            const data = await apiRequest('/api/auth/me');
            if (data && data.authenticated) {
                isAuthenticated = true;
                balance = data.balance;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('profileBtn').style.display = 'flex';
                document.getElementById('username').innerText = data.global_name || data.username;
                document.getElementById('avatar').innerText = (data.global_name || data.username)[0].toUpperCase();
                document.getElementById('balance').innerText = balance.toLocaleString();
                document.getElementById('loginMessage').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                isAuthenticated = false;
                document.getElementById('loginBtn').style.display = 'flex';
                document.getElementById('profileBtn').style.display = 'none';
                document.getElementById('loginMessage').style.display = 'block';
                document.getElementById('mainContent').style.display = 'none';
            }
        } catch (e) {
            console.error('Auth check failed:', e);
        }
    }

    // Вход через Discord
    function loginWithDiscord() {
        window.location.href = `${SERVER}/api/auth/discord`;
    }
</script>
