<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | РЕГИСТРАЦИЯ И ЛОГИН</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .balance {
            background: linear-gradient(135deg, #1a1a1a, #222);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #333;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .auth-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .auth-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #5865F2;
        }

        .key-section {
            background: #1a1a1a;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            border: 1px solid #333;
        }

        .key-input {
            background: #0a0a0a;
            border: 2px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            width: 250px;
            font-family: monospace;
        }

        .key-input:focus {
            outline: none;
            border-color: #5865F2;
        }

        .key-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 3em;
            background: linear-gradient(45deg, #5865F2, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cases {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .case-card {
            background: linear-gradient(135deg, #111, #1a1a1a);
            border: 2px solid #333;
            border-radius: 30px;
            padding: 30px;
            transition: 0.3s;
        }

        .case-card:hover {
            transform: translateY(-10px);
            border-color: var(--case-color);
            box-shadow: 0 0 30px var(--case-color);
        }

        .case-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }

        .case-name {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: var(--case-color);
            margin-bottom: 10px;
        }

        .case-price {
            text-align: center;
            font-size: 20px;
            color: #ffd700;
            margin: 15px 0;
            font-weight: bold;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 20px 0;
        }

        .item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .item-name {
            color: white;
        }

        .item-rarity {
            color: #ffae00;
            font-weight: bold;
        }

        .open-btn {
            background: var(--case-color);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .open-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--case-color);
        }

        .open-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #111, #1a1a1a);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #5865F2;
            animation: modalPop 0.3s;
        }

        @keyframes modalPop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #5865F2;
        }

        .modal input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 2px solid #333;
            color: white;
            border-radius: 15px;
            font-size: 16px;
        }

        .modal input:focus {
            outline: none;
            border-color: #5865F2;
        }

        .modal-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-btn.secondary {
            background: transparent;
            border: 2px solid #5865F2;
        }

        .error-message {
            color: #ff4757;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #333;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.3;
            z-index: 100;
        }

        .admin-btn:hover {
            opacity: 1;
            background: #ff4757;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 30px;
            border-radius: 10px;
            display: none;
            z-index: 2000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="header">
        <div class="balance">💰 <span id="balance">0</span></div>
        
        <div class="user-info" id="userInfo" style="display: none;">
            <span class="username" id="username"></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="auth-buttons" id="authButtons">
            <button class="auth-btn" onclick="showLoginModal()">Войти</button>
            <button class="auth-btn" onclick="showRegisterModal()">Регистрация</button>
        </div>

        <div class="key-section">
            <input type="text" class="key-input" id="keyInput" placeholder="ВВЕДИТЕ КЛЮЧ">
            <button class="key-btn" onclick="useKey()">Активировать</button>
        </div>
    </div>

    <!-- Кейсы -->
    <div class="container" id="mainContent" style="display: none;">
        <h1>🎲 СЕЗОННЫЕ КЕЙСЫ</h1>
        <div class="cases" id="cases"></div>
    </div>

    <!-- Модалка входа -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>🔐 ВХОД</h2>
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <div class="error-message" id="loginError">Неверный логин или пароль</div>
            <button class="modal-btn" onclick="login()">Войти</button>
            <button class="modal-btn secondary" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <!-- Модалка регистрации -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h2>📝 РЕГИСТРАЦИЯ</h2>
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль">
            <div class="error-message" id="registerError"></div>
            <button class="modal-btn" onclick="register()">Зарегистрироваться</button>
            <button class="modal-btn secondary" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <!-- Админ кнопка -->
    <button class="admin-btn" onclick="openAdmin()">⚙️</button>

    <!-- Уведомления -->
    <div class="notification" id="notification"></div>

    <script>
        // ============ ДАННЫЕ ============
        let users = JSON.parse(localStorage.getItem('users')) || {};
        let currentUser = null;
        let balance = 0;

        // Кейсы
        const cases = [
            {
                name: '❄️ ЗИМНИЙ КЕЙС 2025',
                icon: '❄️',
                price: 50000,
                color: '#00d4ff',
                items: [
                    { name: 'NY Limited', rarity: 'LEGENDARY' },
                    { name: 'HOLIDAY', rarity: 'LEGENDARY' },
                    { name: 'WINTER', rarity: 'LEGENDARY' },
                    { name: 'Snow Reaper', rarity: 'LEGENDARY' }
                ]
            },
            {
                name: '🌱 ВЕСЕННИЙ КЕЙС 2026',
                icon: '🌸',
                price: 55000,
                color: '#00ffcc',
                items: [
                    { name: 'FrostBolt', rarity: 'LEGENDARY' },
                    { name: 'NeonCloud', rarity: 'LEGENDARY' },
                    { name: 'AbyssalThunder', rarity: 'LEGENDARY' }
                ]
            },
            {
                name: '🔑 РОЛЕВОЙ КЕЙС',
                icon: '🎲',
                price: 0,
                color: '#ff4757',
                keyOnly: true,
                items: [
                    { name: 'Bloodbound', rarity: 'LEGENDARY', boost: '23% XP' },
                    { name: 'Shadow', rarity: 'EPIC', boost: '12% XP / 25% Money' },
                    { name: 'Veteran', rarity: 'RARE', boost: '7% XP / 12% Money' },
                    { name: 'Eternal', rarity: 'RARE', boost: '3% XP / 6% Money' },
                    { name: 'Phantom', rarity: 'RARE', boost: '3% XP / 4% Money' },
                    { name: 'Chosen', rarity: 'LEGENDARY', boost: '2% Money' }
                ]
            }
        ];

        // ============ ЗАГРУЗКА ============
        window.onload = () => {
            // Создаем тестового пользователя если нет
            if (!users['admin']) {
                users['admin'] = { password: 'admin', balance: 1000000 };
            }
            if (!users['test']) {
                users['test'] = { password: 'test', balance: 50000 };
            }
            localStorage.setItem('users', JSON.stringify(users));
            
            checkSession();
            renderCases();
        };

        function checkSession() {
            const session = localStorage.getItem('session');
            if (session) {
                const data = JSON.parse(session);
                currentUser = data.username;
                balance = data.balance;
                updateUIForAuth();
            } else {
                updateUIForGuest();
            }
        }

        function updateUIForAuth() {
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('username').innerText = currentUser;
            document.getElementById('balance').innerText = balance.toLocaleString();
            document.getElementById('mainContent').style.display = 'block';
        }

        function updateUIForGuest() {
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
        }

        // ============ АВТОРИЗАЦИЯ ============
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function showRegisterModal() {
            document.getElementById('registerModal').classList.add('active');
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            document.getElementById('registerError').style.display = 'none';
        }

        function closeModals() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('registerModal').classList.remove('active');
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                document.getElementById('loginError').innerText = 'Заполните все поля';
                document.getElementById('loginError').style.display = 'block';
                return;
            }

            if (users[username] && users[username].password === password) {
                currentUser = username;
                balance = users[username].balance;
                
                localStorage.setItem('session', JSON.stringify({
                    username: currentUser,
                    balance: balance
                }));
                
                closeModals();
                updateUIForAuth();
                showNotification('✅ Успешный вход!', 'success');
            } else {
                document.getElementById('loginError').innerText = 'Неверный логин или пароль';
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;

            if (!username || !password || !confirm) {
                document.getElementById('registerError').innerText = 'Заполните все поля';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            if (password !== confirm) {
                document.getElementById('registerError').innerText = 'Пароли не совпадают';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            if (username.length < 3) {
                document.getElementById('registerError').innerText = 'Имя должно быть минимум 3 символа';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            if (password.length < 4) {
                document.getElementById('registerError').innerText = 'Пароль должен быть минимум 4 символа';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            if (users[username]) {
                document.getElementById('registerError').innerText = 'Пользователь уже существует';
                document.getElementById('registerError').style.display = 'block';
                return;
            }

            // Создаем нового пользователя
            users[username] = {
                password: password,
                balance: 1000 // Стартовый бонус
            };
            
            localStorage.setItem('users', JSON.stringify(users));
            
            showNotification('✅ Регистрация успешна! Теперь войдите', 'success');
            closeModals();
            showLoginModal();
        }

        function logout() {
            localStorage.removeItem('session');
            currentUser = null;
            balance = 0;
            updateUIForGuest();
            showNotification('👋 Вы вышли из системы');
        }

        // ============ КЛЮЧИ ============
        function useKey() {
            if (!currentUser) {
                showNotification('❌ Сначала войдите', 'error');
                return;
            }

            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) {
                showNotification('❌ Введите ключ', 'error');
                return;
            }

            // Простая проверка ключей
            if (key.startsWith('BAL-')) {
                const value = parseInt(key.split('-')[1]) || 1000;
                balance += value;
                
                // Сохраняем
                users[currentUser].balance = balance;
                localStorage.setItem('users', JSON.stringify(users));
                
                const session = JSON.parse(localStorage.getItem('session'));
                session.balance = balance;
                localStorage.setItem('session', JSON.stringify(session));
                
                document.getElementById('balance').innerText = balance.toLocaleString();
                showNotification(`✅ +${value} монет!`);
                
            } else if (key.startsWith('ROLE-')) {
                openRoleCase();
                showNotification('✅ Ключ на ролевой кейс активирован!');
                
            } else if (key.startsWith('WINT-')) {
                showNotification('✅ Ключ на зимний кейс активирован!');
                
            } else if (key.startsWith('SPRG-')) {
                showNotification('✅ Ключ на весенний кейс активирован!');
                
            } else {
                showNotification('❌ Неверный ключ', 'error');
            }
            
            document.getElementById('keyInput').value = '';
        }

        // ============ КЕЙСЫ ============
        function renderCases() {
            const container = document.getElementById('cases');
            container.innerHTML = '';
            
            cases.forEach(c => {
                const itemsHtml = c.items.map(item => `
                    <div class="item">
                        <span class="item-name">${item.name}</span>
                        <span class="item-rarity">[${item.rarity}]</span>
                    </div>
                `).join('');
                
                container.innerHTML += `
                    <div class="case-card" style="--case-color: ${c.color}">
                        <div class="case-icon">${c.icon}</div>
                        <div class="case-name">${c.name}</div>
                        <div class="case-price">${c.price ? '💰 ' + c.price.toLocaleString() : '🔑 ПО КЛЮЧУ'}</div>
                        <div class="items-list">${itemsHtml}</div>
                        <button class="open-btn" 
                                style="background: ${c.color}"
                                onclick="openCase('${c.name}')"
                                ${c.keyOnly ? 'disabled' : ''}>
                            ${c.keyOnly ? 'ТОЛЬКО ПО КЛЮЧУ' : 'ОТКРЫТЬ КЕЙС'}
                        </button>
                    </div>
                `;
            });
        }

        function openCase(caseName) {
            if (!currentUser) {
                showNotification('❌ Сначала войдите', 'error');
                return;
            }

            const caseData = cases.find(c => c.name === caseName);
            if (!caseData || caseData.keyOnly) return;

            if (balance < caseData.price) {
                showNotification('❌ Недостаточно монет!', 'error');
                return;
            }

            balance -= caseData.price;
            
            // Сохраняем
            users[currentUser].balance = balance;
            localStorage.setItem('users', JSON.stringify(users));
            
            const session = JSON.parse(localStorage.getItem('session'));
            session.balance = balance;
            localStorage.setItem('session', JSON.stringify(session));
            
            document.getElementById('balance').innerText = balance.toLocaleString();

            const winItem = caseData.items[Math.floor(Math.random() * caseData.items.length)];
            showNotification(`🎉 Вы получили: ${winItem.name} [${winItem.rarity}]!`);
        }

        function openRoleCase() {
            const items = [
                { name: 'Bloodbound', rarity: 'LEGENDARY' },
                { name: 'Shadow', rarity: 'EPIC' },
                { name: 'Veteran', rarity: 'RARE' },
                { name: 'Eternal', rarity: 'RARE' },
                { name: 'Phantom', rarity: 'RARE' },
                { name: 'Chosen', rarity: 'LEGENDARY' }
            ];

            const winItem = items[Math.floor(Math.random() * items.length)];
            showNotification(`🎉 Вы получили: ${winItem.name} [${winItem.rarity}]!`);
        }

        // ============ АДМИН ============
        function openAdmin() {
            const pass = prompt('Пароль админа:');
            if (pass === '1337') {
                let action = prompt('1 - Создать ключ на баланс\n2 - Создать ключ на кейс');
                
                if (action === '1') {
                    let amount = prompt('Сумма:', '1000');
                    let key = `BAL-${amount}-${Math.floor(Math.random() * 9000 + 1000)}-L`;
                    showNotification(`✅ Ключ создан: ${key}`);
                } else if (action === '2') {
                    let type = prompt('Тип кейса (role/winter/spring):', 'role');
                    let key = `${type.toUpperCase()}-${Math.floor(Math.random() * 9000 + 1000)}-L`;
                    showNotification(`✅ Ключ создан: ${key}`);
                }
            } else {
                showNotification('❌ Неверный пароль', 'error');
            }
        }

        // ============ УВЕДОМЛЕНИЯ ============
        function showNotification(text, type = 'success') {
            const notif = document.getElementById('notification');
            notif.style.background = type === 'success' ? '#5865F2' : '#ff4757';
            notif.style.color = 'white';
            notif.innerText = text;
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
