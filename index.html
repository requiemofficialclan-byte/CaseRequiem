<!DOCTYPE html><html lang="ru"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Clan Case System | [L] Edition</title>    <style>        :root { --main-color: #00ffcc; --bg-dark: #121212; --card-bg: #1e1e1e; }        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }                /* Шапка */        .header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; }        .user-profile { display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 10px 20px; border-radius: 50px; border: 1px solid #333; }        .avatar { width: 35px; height: 35px; background: var(--main-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }        /* Контейнер кейса */        .main-container { margin-top: 40px; text-align: center; width: 100%; max-width: 800px; padding: 20px; }        .case-preview { width: 200px; height: 200px; margin-bottom: 20px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); border: 2px solid var(--main-color); }        /* Поле ввода ключа */        .input-group { margin: 20px 0; }        input[type="text"] { background: #252525; border: 2px solid #444; color: white; padding: 15px; border-radius: 10px; width: 280px; font-size: 18px; text-align: center; transition: 0.3s; }        input:focus { border-color: var(--main-color); outline: none; box-shadow: 0 0 10px var(--main-color); }        /* Рулетка */        .roulette-wrapper { position: relative; width: 100%; height: 160px; border: 4px solid #333; background: #1a1a1a; overflow: hidden; border-radius: 15px; display: none; margin-top: 20px; }        .selector { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: #ff4757; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px red; }        .tape { display: flex; position: absolute; left: 0; top: 15px; transition: transform 6s cubic-bezier(0.15, 0, 0.05, 1); }        .item { width: 130px; height: 130px; margin: 0 5px; background: #222; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }        .item img { width: 110px; height: 110px; border-radius: 5px; }        /* Кнопки */        .btn { background: var(--main-color); color: black; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; margin-top: 10px; }        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--main-color); }        .btn:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }        /* Окно результата */        #result-box { display: none; margin-top: 30px; background: var(--card-bg); padding: 25px; border-radius: 15px; border: 2px solid var(--main-color); animation: fadeIn 0.5s; }        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }        /* Админка */        .admin-trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.1; cursor: pointer; font-size: 10px; }        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 30px; border-radius: 20px; border: 2px solid var(--main-color); z-index: 1000; width: 320px; box-shadow: 0 0 100px black; }        .key-list { background: #111; padding: 10px; border-radius: 5px; max-height: 150px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 14px; margin-top: 15px; }    </style></head><body>    <div class="header">        <div class="user-profile">            <div class="avatar">?</div>            <span id="player-name">Игрок</span>        </div>        <div style="color: var(--main-color); font-weight: bold;">[L] SPRING SEASON</div>    </div>    <div class="main-container">        <h1>КЕЙС: STORM BRINGER ???</h1>        <img src="https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076" class="case-preview" alt="Case">        <div id="setup-area">            <div class="input-group">                <input type="text" id="entry-key" placeholder="ВВЕДИТЕ ID КЛЮЧ">            </div>            <button class="btn" onclick="checkKey()">АКТИВИРОВАТЬ</button>        </div>        <div class="roulette-wrapper" id="roulette-ui">            <div class="selector"></div>            <div class="tape" id="tape"></div>        </div>        <button class="btn" id="spin-btn" style="display:none;" onclick="startSpin()">ОТКРЫТЬ КЕЙС</button>        <div id="result-box">            <h2 id="win-name" style="color: var(--main-color);">ВЫ ВЫБИЛИ: Storm Bringer</h2>            <p>Ваш секретный код подтверждения:</p>            <input type="text" id="final-code" readonly style="width: 220px; background: #111; color: var(--main-color);"> <br>            <button class="btn" onclick="copyFinal()" style="font-size: 14px; padding: 10px 20px;">КОПИРОВАТЬ И ОТПРАВИТЬ</button>        </div>    </div>    <div class="admin-trigger" onclick="openAdmin()">[A]</div>    <div id="admin-panel">        <h3>?? ПАНЕЛЬ СОЗДАТЕЛЯ</h3>        <button class="btn" onclick="generateKey()" style="width: 100%;">СОЗДАТЬ ID КЛЮЧ</button>        <div class="key-list" id="log-list">Ключи не созданы...</div>        <button onclick="closeAdmin()" style="margin-top: 15px; background: none; color: gray; border: none; cursor: pointer;">Закрыть</button>    </div>    <script>        const ADMIN_PASS = "1337"; // ТВОЙ ПАРОЛЬ ТУТ        const items = [            { name: "Storm Bringer", img: "https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076" },            { name: "Vortex Lord", img: "https://r.jina.ai/i/450b71ca7db94f6f81e646270b2be881" },            { name: "Crystal Caster", img: "https://r.jina.ai/i/65022e389df04a439df68971f11a4325" },            { name: "Venom Flash", img: "https://r.jina.ai/i/55022e389df04a439df68971f11a4325" }        ];        // Инициализация ленты        function buildTape() {            const tape = document.getElementById('tape');            tape.innerHTML = "";            for (let i = 0; i < 70; i++) {                const item = items[Math.floor(Math.random() * items.length)];                const div = document.createElement('div');                div.className = 'item';                div.innerHTML = `<img src="${item.img}">`;                tape.appendChild(div);            }        }        function checkKey() {            const key = document.getElementById('entry-key').value.trim();            if (key.length >= 8) {                document.getElementById('setup-area').style.display = 'none';                document.getElementById('roulette-ui').style.display = 'block';                document.getElementById('spin-btn').style.display = 'inline-block';                buildTape();            } else {                alert("Ошибка: Неверный или короткий ключ!");            }        }        function startSpin() {            const btn = document.getElementById('spin-btn');            const tape = document.getElementById('tape');            btn.disabled = true;            const winIndex = 55; // Элемент, на котором остановимся            const itemWidth = 140;             const offset = (winIndex * itemWidth) - (700 / 2) + (itemWidth / 2);            const randomExtra = Math.floor(Math.random() * 80) - 40; // Немного рандома в позиции            tape.style.transform = `translateX(-${offset + randomExtra}px)`;            setTimeout(() => {                const result = items[Math.floor(Math.random() * items.length)];                const code = "WIN-" + Math.random().toString(36).substring(2, 8).toUpperCase();                                document.getElementById('win-name').innerText = "ВЫ ВЫБИЛИ: " + result.name;                document.getElementById('final-code').value = code + "-" + document.getElementById('entry-key').value.substring(0,3);                document.getElementById('result-box').style.display = 'block';            }, 6000);        }        function copyFinal() {            const el = document.getElementById('final-code');            el.select();            document.execCommand('copy');            alert("Код скопирован! Отправь его админу в Discord.");        }        // Админ функции        function openAdmin() {            if (prompt("Пароль:") === ADMIN_PASS) {                document.getElementById('admin-panel').style.display = 'block';            }        }        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }        function generateKey() {            const key = Math.random().toString(36).substring(2, 12).toUpperCase();            const log = document.getElementById('log-list');            if(log.innerText.includes("Ключи не")) log.innerText = "";            log.innerHTML += `<div>Ключ: <b>${key}</b></div>`;            navigator.clipboard.writeText(key);            alert("Ключ создан и скопирован!");        }        window.onload = () => {            const name = prompt("Как тебя зовут в Discord?");            if(name) {                document.getElementById('player-name').innerText = name;                document.querySelector('.avatar').innerText = name[0].toUpperCase();            }        };    </script></body></html>
