<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CLAN CASE | SIMPLE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 90%;
            max-width: 400px;
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00ffcc;
        }
        
        .case-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .case {
            flex: 1;
            padding: 20px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }
        
        .case:hover {
            border-color: #00ffcc;
            transform: translateY(-5px);
        }
        
        .case img {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }
        
        .case.selected {
            border-color: #00ffcc;
            background: #1a1a1a;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid #333;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            font-family: monospace;
        }
        
        input:focus {
            outline: none;
            border-color: #00ffcc;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #00ffcc;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
        
        .message.error {
            background: #ff4757;
            color: white;
        }
        
        .message.success {
            background: #00ffcc;
            color: black;
        }
        
        .message.info {
            background: #ffaa00;
            color: black;
        }
        
        .roulette {
            display: none;
            margin: 20px 0;
            height: 100px;
            overflow: hidden;
            position: relative;
            border: 2px solid #333;
            border-radius: 10px;
        }
        
        .roulette-items {
            display: flex;
            animation: spin 3s ease-out forwards;
        }
        
        .roulette-item {
            min-width: 80px;
            height: 80px;
            margin: 10px 5px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .roulette-item img {
            width: 50px;
            height: 50px;
        }
        
        .result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #1a1a1a;
            border: 2px solid #00ffcc;
            border-radius: 15px;
            text-align: center;
        }
        
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #333;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.5;
        }
        
        .admin-btn:hover {
            opacity: 1;
        }
        
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
        }
        
        .admin-box {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 300px;
        }
        
        .new-key {
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 CLAN CASE</h1>
        
        <!-- Выбор кейса -->
        <div class="case-selector">
            <div class="case" onclick="selectCase('spring')" id="caseSpring">
                <img src="https://cdn-icons-png.flaticon.com/512/2850/2850906.png">
                <div>Весенний</div>
            </div>
            <div class="case" onclick="selectCase('winter')" id="caseWinter">
                <img src="https://cdn-icons-png.flaticon.com/512/2322/2322731.png">
                <div>Зимний</div>
            </div>
        </div>
        
        <!-- Поле для ключа -->
        <input type="text" id="keyInput" placeholder="Введите ключ" disabled>
        
        <!-- Кнопка -->
        <button id="mainBtn" onclick="startSpin()" disabled>Активировать</button>
        
        <!-- Сообщения -->
        <div class="message" id="message"></div>
        
        <!-- Рулетка -->
        <div class="roulette" id="roulette">
            <div class="roulette-items" id="rouletteItems"></div>
        </div>
        
        <!-- Результат -->
        <div class="result" id="result">
            <h2 id="winName"></h2>
            <p id="winRarity"></p>
            <button onclick="resetGame()">Завершить</button>
        </div>
    </div>
    
    <!-- Админка -->
    <div class="admin-btn" onclick="openAdmin()">⚙️</div>
    
    <div class="admin-panel" id="adminPanel">
        <div class="admin-box">
            <h3 style="margin-bottom: 20px;">Админ панель</h3>
            <button onclick="createKey('spring')" style="margin-bottom: 10px;">🌱 Создать весенний</button>
            <button onclick="createKey('winter')" style="margin-bottom: 10px;">❄️ Создать зимний</button>
            <div class="new-key" id="newKey"></div>
            <button onclick="closeAdmin()" style="margin-top: 20px; background: #ff4757;">Закрыть</button>
        </div>
    </div>
    
    <script>
        // Настройки
        const SERVER = 'http://localhost:5000';
        let selectedCase = '';
        let username = localStorage.getItem('username') || 'user';
        let currentKey = '';
        let isSpinning = false;
        
        // Предметы
        const items = {
            spring: [
                { name: 'Легендарный меч', rarity: 'Легендарный', color: '#ffae00', chance: 1 },
                { name: 'Трава', rarity: 'Обычный', color: '#aaa', chance: 49 },
                { name: 'Цветок', rarity: 'Редкий', color: '#4caf50', chance: 30 },
                { name: 'Бабочка', rarity: 'Эпический', color: '#9c27b0', chance: 20 }
            ],
            winter: [
                { name: 'Ледяной меч', rarity: 'Легендарный', color: '#ffae00', chance: 1 },
                { name: 'Снежок', rarity: 'Обычный', color: '#aaa', chance: 49 },
                { name: 'Морозный плащ', rarity: 'Редкий', color: '#2196f3', chance: 30 },
                { name: 'Рога', rarity: 'Эпический', color: '#9c27b0', chance: 20 }
            ]
        };
        
        // Иконки (для красоты)
        const icons = {
            'Легендарный меч': '⚔️',
            'Трава': '🌱',
            'Цветок': '🌸',
            'Бабочка': '🦋',
            'Ледяной меч': '❄️⚔️',
            'Снежок': '⛄',
            'Морозный плащ': '🧥',
            'Рога': '🦌'
        };
        
        // Запуск
        window.onload = () => {
            let name = prompt('Ваш Discord username (без @):');
            if (name) {
                username = name.toLowerCase().trim();
                localStorage.setItem('username', username);
            }
        };
        
        // Выбор кейса
        function selectCase(type) {
            selectedCase = type;
            document.getElementById('caseSpring').style.borderColor = '#333';
            document.getElementById('caseWinter').style.borderColor = '#333';
            
            if (type === 'spring') {
                document.getElementById('caseSpring').style.borderColor = '#00ffcc';
            } else {
                document.getElementById('caseWinter').style.borderColor = '#00d4ff';
            }
            
            document.getElementById('keyInput').disabled = false;
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('keyInput').focus();
            showMessage('');
        }
        
        // Показать сообщение
        function showMessage(text, type = '') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
        
        // ОСНОВНАЯ ФУНКЦИЯ
        async function startSpin() {
            if (isSpinning) return;
            
            const key = document.getElementById('keyInput').value.trim().toUpperCase();
            if (!key) {
                showMessage('Введите ключ', 'error');
                return;
            }
            
            // Блокируем кнопки
            isSpinning = true;
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('keyInput').disabled = true;
            showMessage('Проверка ключа...', 'info');
            
            try {
                // Проверяем ключ на сервере
                const response = await fetch(`${SERVER}/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        key: key,
                        username: username
                    })
                });
                
                const data = await response.json();
                
                if (!data.success) {
                    showMessage(data.message, 'error');
                    isSpinning = false;
                    document.getElementById('mainBtn').disabled = false;
                    document.getElementById('keyInput').disabled = false;
                    return;
                }
                
                // Ключ принят - запускаем рулетку
                currentKey = key;
                showMessage('✅ Ключ принят!', 'success');
                startRoulette();
                
            } catch (error) {
                showMessage('Ошибка соединения с сервером', 'error');
                isSpinning = false;
                document.getElementById('mainBtn').disabled = false;
                document.getElementById('keyInput').disabled = false;
            }
        }
        
        // Запуск рулетки
        function startRoulette() {
            const pool = items[selectedCase];
            
            // Создаем ленту
            const roulette = document.getElementById('rouletteItems');
            roulette.innerHTML = '';
            
            for (let i = 0; i < 20; i++) {
                for (let j = 0; j < pool.length; j++) {
                    const item = pool[j];
                    const icon = icons[item.name] || '🎁';
                    roulette.innerHTML += `<div class="roulette-item">${icon}</div>`;
                }
            }
            
            // Выбираем выигрыш
            let r = Math.random() * 100;
            let cumulative = 0;
            let winItem = pool[0];
            
            for (let item of pool) {
                cumulative += item.chance;
                if (r <= cumulative) {
                    winItem = item;
                    break;
                }
            }
            
            // Показываем рулетку
            document.getElementById('roulette').style.display = 'block';
            
            // Запускаем анимацию
            setTimeout(() => {
                roulette.style.animation = 'spin 3s ease-out forwards';
            }, 100);
            
            // Показываем результат
            setTimeout(async () => {
                document.getElementById('roulette').style.display = 'none';
                document.getElementById('result').style.display = 'block';
                document.getElementById('winName').textContent = winItem.name;
                document.getElementById('winRarity').textContent = winItem.rarity;
                
                // Активируем ключ на сервере
                try {
                    await fetch(`${SERVER}/activate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            key: currentKey,
                            username: username
                        })
                    });
                } catch {}
                
                currentKey = '';
                isSpinning = false;
            }, 3100);
        }
        
        // Сброс игры
        function resetGame() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('keyInput').value = '';
            document.getElementById('keyInput').disabled = false;
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('rouletteItems').style.animation = 'none';
            showMessage('');
            selectedCase = '';
            document.getElementById('caseSpring').style.borderColor = '#333';
            document.getElementById('caseWinter').style.borderColor = '#333';
        }
        
        // Админка
        async function openAdmin() {
            const pass = prompt('Пароль:');
            if (pass === '1337') {
                document.getElementById('adminPanel').style.display = 'flex';
            }
        }
        
        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }
        
        async function createKey(type) {
            try {
                const response = await fetch(`${SERVER}/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pass: '1337',
                        type: type
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('newKey').innerHTML = 
                        `✅ Новый ключ:<br><strong>${data.key}</strong>`;
                }
            } catch (error) {
                document.getElementById('newKey').innerHTML = '❌ Ошибка';
            }
        }
        
        // Освобождаем ключ при закрытии
        window.addEventListener('beforeunload', () => {
            if (currentKey) {
                fetch(`${SERVER}/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: currentKey })
                });
            }
        });
    </script>
</body>
</html>
