<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan Case Palace | [L] Edition</title>
    <style>
        :root { --main-color: #00ffcc; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Шапка */
        .header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; }
        .user-profile { display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 10px 20px; border-radius: 50px; border: 1px solid #333; }
        .avatar { width: 35px; height: 35px; background: var(--main-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 20px; }

        /* Контейнер кейса */
        .main-container { margin-top: 40px; text-align: center; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box;}
        
        /* Исправление картинки на скриншоте (чтобы была круглой и красивой) */
        .case-preview { width: 150px; height: 150px; margin-bottom: 20px; border-radius: 50%; box-shadow: 0 0 30px rgba(0, 255, 204, 0.3); border: 3px solid var(--main-color); object-fit: cover; }

        /* Поле ввода ключа */
        .input-group { margin: 20px 0; }
        input[type="text"] { background: #252525; border: 2px solid #444; color: white; padding: 15px; border-radius: 10px; width: 300px; max-width: 90%; font-size: 18px; text-align: center; transition: 0.3s; font-family: monospace; }
        input:focus { border-color: var(--main-color); outline: none; box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }

        /* Рулетка */
        .roulette-wrapper { position: relative; width: 100%; height: 160px; border: 4px solid #333; background: #1a1a1a; overflow: hidden; border-radius: 15px; display: none; margin-top: 20px; box-sizing: border-box;}
        .selector { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: #ff4757; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px red; }
        .tape { display: flex; position: absolute; left: 0; top: 15px; transition: transform 6s cubic-bezier(0.15, 0, 0.05, 1); }
        .item { width: 130px; height: 130px; margin: 0 5px; background: #222; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .item img { width: 110px; height: 110px; border-radius: 5px; object-fit: cover; }

        /* Кнопки */
        .btn { background: var(--main-color); color: black; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; width: 330px; max-width: 90%;}
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 255, 204, 0.6); }
        .btn:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; opacity: 0.5; }

        /* Окно результата */
        #result-box { display: none; margin-top: 30px; background: var(--card-bg); padding: 25px; border-radius: 15px; border: 2px solid var(--main-color); animation: fadeIn 0.8s; max-width: 90%; margin-left: auto; margin-right: auto;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Админка */
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.1; cursor: pointer; font-size: 12px; color: gray; z-index: 100; }
        .admin-trigger:hover { opacity: 0.5; color: white; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 30px; border-radius: 20px; border: 2px solid var(--main-color); z-index: 1000; width: 350px; max-width: 90%; box-shadow: 0 0 100px rgba(0,0,0,0.8); text-align: center; }
        .key-list { background: #111; padding: 15px; border-radius: 10px; max-height: 200px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 14px; margin-top: 20px; border: 1px solid #333; color: #aaa; }
        .key-list b { color: var(--main-color); }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-profile">
            <div class="avatar" id="avatar-char">?</div>
            <span id="player-name">Гость</span>
        </div>
        <div style="color: var(--main-color); font-weight: bold; font-size: 14px; text-transform: uppercase;">[L] SPRING SEASON</div>
    </div>

    <div class="main-container">
        <h1>КЕЙС: STORM BRINGER 🌩️</h1>
        <img src="https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076" class="case-preview" alt="Case">

        <div id="setup-area">
            <div class="input-group">
                <input type="text" id="entry-key" placeholder="ВСТАВЬТЕ ID КЛЮЧ">
            </div>
            <button class="btn" onclick="checkKey()">АКТИВИРОВАТЬ</button>
        </div>

        <div class="roulette-wrapper" id="roulette-ui">
            <div class="selector"></div>
            <div class="tape" id="tape"></div>
        </div>

        <button class="btn" id="spin-btn" style="display:none;" onclick="startSpin()">ОТКРЫТЬ КЕЙС</button>

        <div id="result-box">
            <h2 id="win-name" style="color: var(--main-color); text-transform: uppercase;">ВЫ ВЫБИЛИ: Storm Bringer</h2>
            <p style="color: #aaa;">Отчет уже отправлен Создателю в Discord.</p>
            <p>Ваш код для истории (необязательно):</p>
            <input type="text" id="final-code" readonly style="width: 250px; background: #111; color: var(--main-color); border: 1px solid #333;"> <br>
            <button class="btn" onclick="copyFinal()" style="font-size: 14px; padding: 10px 20px; width: auto; margin-top: 20px;">КОПИРОВАТЬ КОД</button>
        </div>
    </div>

    <div class="admin-trigger" onclick="openAdmin()">[A] Панель</div>
    <div id="admin-panel">
        <h3 style="color: var(--main-color);">🔐 ПАНЕЛЬ СОЗДАТЕЛЯ</h3>
        <p style="color: #aaa; font-size: 14px;">Создайте ключ и продайте его в Discord.</p>
        <button class="btn" onclick="generateKey()" style="width: 100%;">СОЗДАТЬ ID КЛЮЧ</button>
        <div class="key-list" id="log-list">Ключи еще не созданы...</div>
        <button onclick="closeAdmin()" style="margin-top: 20px; background: none; color: gray; border: none; cursor: pointer; font-size: 14px;">[ Закрыть ]</button>
    </div>

    <script>
        // === НАСТРОЙКИ СТРАНИЦЫ ===
        const ADMIN_PASS = "1337"; // Замени этот пароль на свой секретный!
        
        // ВАЖНО: Вставь сюда ссылку на Webhook из настроек твоего Discord канала
        const DISCORD_WEBHOOK_URL = "ВСТАВЬ_СЮДА_ССЫЛКУ_НА_ВЕБХУК"; 

        const items = [
            { name: "Storm Bringer", img: "https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076" },
            { name: "Vortex Lord", img: "https://r.jina.ai/i/450b71ca7db94f6f81e646270b2be881" },
            { name: "Crystal Caster", img: "https://r.jina.ai/i/65022e389df04a439df68971f11a4325" },
            { name: "Venom Flash", img: "https://r.jina.ai/i/55022e389df04a439df68971f11a4325" }
        ];

        // Инициализация ленты
        function buildTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = "";
            for (let i = 0; i < 70; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<img src="${item.img}" alt="${item.name}">`;
                tape.appendChild(div);
            }
        }

        let currentPlayerName = "Гость";

        function checkKey() {
            const key = document.getElementById('entry-key').value.trim();
            if (key.length >= 8) {
                document.getElementById('setup-area').style.display = 'none';
                document.getElementById('roulette-ui').style.display = 'block';
                document.getElementById('spin-btn').style.display = 'inline-block';
                buildTape();
            } else {
                alert("Ошибка: Ключ должен быть длиннее 8 символов!");
            }
        }

        function startSpin() {
            const btn = document.getElementById('spin-btn');
            const tape = document.getElementById('tape');
            btn.disabled = true;

            const winIndex = 55; // На каком элементе остановимся
            const itemWidth = 140; 
            const offset = (winIndex * itemWidth) - (tape.parentElement.offsetWidth / 2) + (itemWidth / 2);
            
            tape.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                const result = items[Math.floor(Math.random() * items.length)];
                const enteredKey = document.getElementById('entry-key').value.trim();
                const winCode = "WIN-" + Math.random().toString(36).substring(2, 8).toUpperCase() + "-" + enteredKey.substring(0,3);
                
                document.getElementById('win-name').innerText = "ВЫ ВЫБИЛИ: " + result.name;
                document.getElementById('final-code').value = winCode;
                document.getElementById('result-box').style.display = 'block';
                btn.style.display = 'none';

                // ОТПРАВЛЯЕМ ЛОГ В DISCORD
                sendDiscordLog(currentPlayerName, enteredKey, result.name, winCode);

            }, 6100); // 6 секунд на анимацию + запас
        }

        // Функция отправки лога через Webhook
        function sendDiscordLog(playerName, usedKey, prizeName, checkCode) {
            if (!DISCORD_WEBHOOK_URL || DISCORD_WEBHOOK_URL === "https://discord.com/api/webhooks/1483941280248496210/QHWJYcnhPD8Voht5mElw7KVNX-vr4yU5gHQrFoAwTE14vqB9MNnIISuTCjOfMYCEq0cA") {
                console.warn("Webhook URL не настроен. Лог не отправлен.");
                return;
            }

            const message = {
                username: "Кейс-Логгер Клана",
                avatar_url: "https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076", // Иконка шторма
                embeds: [{
                    title: "🎁 Кейс успешно открыт!",
                    color: 65535, // Бирюзовый цвет
                    fields: [
                        { name: "👤 Игрок", value: playerName, inline: true },
                        { name: "🔑 Использованный ID", value: "`" + usedKey + "`", inline: true },
                        { name: "🏆 Выпавший приз", value: "**" + prizeName + "**", inline: false },
                        { name: "📄 Код проверки", value: "`" + checkCode + "`", inline: false }
                    ],
                    timestamp: new Date(),
                    footer: { text: "Проверь списание денег в Noctaly!" }
                }]
            };

            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message)
            }).then(() => {
                console.log("Лог успешно отправлен в Discord.");
            }).catch(err => {
                console.error("Ошибка отправки Webhook:", err);
            });
        }

        function copyFinal() {
            const el = document.getElementById('final-code');
            el.select();
            document.execCommand('copy');
            alert("Код скопирован.");
        }

        // === АДМИН ПАНЕЛЬ ===
        function openAdmin() {
            const pass = prompt("Пароль создателя:");
            if (pass === ADMIN_PASS) {
                document.getElementById('admin-panel').style.display = 'block';
            } else if (pass !== null) {
                alert("Доступ запрещен!");
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function generateKey() {
            // Генерируем 10-значный ID (твоя задача)
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 10; i++) {
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            const log = document.getElementById('log-list');
            if(log.innerText.includes("Ключи еще не")) log.innerText = "";
            log.innerHTML += `<div>ID: <b>${key}</b></div>`;
            navigator.clipboard.writeText(key);
            alert("Ключ " + key + " создан и скопирован!");
        }

        // Запрос ника при входе
        window.onload = () => {
            const name = prompt("Как тебя зовут в Discord? (Ник нужен для отчета)");
            if(name && name.trim() !== "") {
                currentPlayerName = name.trim();
                document.getElementById('player-name').innerText = currentPlayerName;
                document.getElementById('avatar-char').innerText = currentPlayerName[0].toUpperCase();
            }
        };
    </script>
</body>
</html>
