<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAN CASE | ПРОСТАЯ ВЕРСИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: white;
            padding: 20px;
        }

        .balance {
            background: #1a1a1a;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid gold;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .cases {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .case {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .case h3 {
            margin-bottom: 15px;
        }

        .price {
            color: gold;
            font-size: 20px;
            margin: 15px 0;
        }

        .open-btn {
            background: var(--color);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        /* Анимация прямо здесь */
        .animation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .animation-box {
            background: #1a1a1a;
            border: 3px solid var(--anim-color);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .slot-machine {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 30px 0;
            perspective: 500px;
        }

        .slot {
            width: 100px;
            height: 100px;
            background: #0a0a0a;
            border: 2px solid var(--anim-color);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            animation: spin 0.2s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(360deg); }
        }

        .slot:nth-child(1) { animation-duration: 0.1s; }
        .slot:nth-child(2) { animation-duration: 0.15s; }
        .slot:nth-child(3) { animation-duration: 0.2s; }

        .result {
            font-size: 32px;
            margin-top: 20px;
            color: var(--anim-color);
            display: none;
        }

        .close-animation {
            background: var(--anim-color);
            color: black;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>
    <div class="balance">💰 <span id="balance">0</span></div>

    <div class="cases">
        <!-- Зимний кейс -->
        <div class="case" style="--color: #00d4ff">
            <h3>❄️ ЗИМНИЙ КЕЙС</h3>
            <div class="price">🔑 ПО КЛЮЧУ</div>
            <button class="open-btn" style="background: #00d4ff" onclick="openWinterCase()">ОТКРЫТЬ</button>
        </div>

        <!-- Весенний кейс -->
        <div class="case" style="--color: #00ffcc">
            <h3>🌸 ВЕСЕННИЙ КЕЙС</h3>
            <div class="price">💰 55,000</div>
            <button class="open-btn" style="background: #00ffcc" onclick="openSpringCase()">ОТКРЫТЬ</button>
        </div>

        <!-- Ролевой кейс -->
        <div class="case" style="--color: #ff4757">
            <h3>🎲 РОЛЕВОЙ КЕЙС</h3>
            <div class="price">🔑 ПО КЛЮЧУ</div>
            <button class="open-btn" style="background: #ff4757" onclick="openRoleCase()">ОТКРЫТЬ</button>
        </div>
    </div>

    <!-- Анимация открытия -->
    <div class="animation-overlay" id="animation">
        <div class="animation-box" id="animBox">
            <h2 id="animTitle" style="color: var(--anim-color)">ОТКРЫТИЕ КЕЙСА</h2>
            
            <div class="slot-machine" id="slotMachine">
                <div class="slot" id="slot1">🎲</div>
                <div class="slot" id="slot2">🎲</div>
                <div class="slot" id="slot3">🎲</div>
            </div>

            <div class="result" id="result">
                <div id="resultIcon" style="font-size: 60px;">🎁</div>
                <div id="resultName"></div>
            </div>

            <button class="close-animation" id="closeAnim" onclick="closeAnimation()">ПРОДОЛЖИТЬ</button>
        </div>
    </div>

    <script>
        let balance = 50000; // Для теста

        // Предметы
        const winterItems = [
            { name: 'NY Limited', icon: '❄️' },
            { name: 'HOLIDAY', icon: '🎁' },
            { name: 'WINTER', icon: '🎄' },
            { name: 'Snow Reaper', icon: '🌨️' }
        ];

        const springItems = [
            { name: 'FrostBolt', icon: '❄️⚡' },
            { name: 'NeonCloud', icon: '☁️' },
            { name: 'AbyssalThunder', icon: '🌩️' }
        ];

        const roleItems = [
            { name: 'Bloodbound', icon: '🩸' },
            { name: 'Shadow', icon: '👤' },
            { name: 'Veteran', icon: '⚔️' },
            { name: 'Eternal', icon: '∞' },
            { name: 'Phantom', icon: '👻' },
            { name: 'Chosen', icon: '⭐' }
        ];

        function openWinterCase() {
            const winItem = winterItems[Math.floor(Math.random() * winterItems.length)];
            startAnimation(winItem, '#00d4ff', '❄️ ЗИМНИЙ КЕЙС');
        }

        function openSpringCase() {
            if (balance < 55000) {
                alert('❌ Недостаточно монет!');
                return;
            }
            balance -= 55000;
            document.getElementById('balance').innerText = balance;
            
            const winItem = springItems[Math.floor(Math.random() * springItems.length)];
            startAnimation(winItem, '#00ffcc', '🌸 ВЕСЕННИЙ КЕЙС');
        }

        function openRoleCase() {
            const winItem = roleItems[Math.floor(Math.random() * roleItems.length)];
            startAnimation(winItem, '#ff4757', '🎲 РОЛЕВОЙ КЕЙС');
        }

        function startAnimation(winItem, color, title) {
            const anim = document.getElementById('animation');
            const box = document.getElementById('animBox');
            const titleEl = document.getElementById('animTitle');
            const slot1 = document.getElementById('slot1');
            const slot2 = document.getElementById('slot2');
            const slot3 = document.getElementById('slot3');
            const result = document.getElementById('result');
            const resultIcon = document.getElementById('resultIcon');
            const resultName = document.getElementById('resultName');
            const closeBtn = document.getElementById('closeAnim');

            // Устанавливаем цвет
            box.style.setProperty('--anim-color', color);
            titleEl.style.color = color;
            titleEl.innerText = title;

            // Случайные иконки в слотах
            const allItems = [...winterItems, ...springItems, ...roleItems];
            slot1.innerText = allItems[Math.floor(Math.random() * allItems.length)].icon;
            slot2.innerText = allItems[Math.floor(Math.random() * allItems.length)].icon;
            slot3.innerText = allItems[Math.floor(Math.random() * allItems.length)].icon;

            // Показываем анимацию
            anim.style.display = 'flex';
            result.style.display = 'none';
            closeBtn.style.display = 'none';

            // Останавливаем слоты по очереди
            setTimeout(() => {
                slot1.style.animation = 'none';
                slot1.innerText = winItem.icon;
            }, 2000);

            setTimeout(() => {
                slot2.style.animation = 'none';
                slot2.innerText = winItem.icon;
            }, 2500);

            setTimeout(() => {
                slot3.style.animation = 'none';
                slot3.innerText = winItem.icon;
            }, 3000);

            // Показываем результат
            setTimeout(() => {
                resultIcon.innerText = winItem.icon;
                resultName.innerText = winItem.name;
                result.style.display = 'block';
                closeBtn.style.display = 'inline-block';
            }, 3500);
        }

        function closeAnimation() {
            document.getElementById('animation').style.display = 'none';
            
            // Сбрасываем слоты
            const slots = document.querySelectorAll('.slot');
            slots.forEach(slot => {
                slot.style.animation = '';
                slot.innerText = '🎲';
            });
        }
    </script>
</body>
</html>
