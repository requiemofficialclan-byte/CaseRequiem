<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan Case System | [L] Safe</title>
    <style>
        :root { --main-color: #00ffcc; --winter-color: #00d4ff; --bg-dark: #070707; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .particle { position: fixed; top: -10%; pointer-events: none; z-index: 99; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 20px; z-index: 100; }
        .user-profile { display: flex; align-items: center; gap: 10px; background: #111; padding: 8px 15px; border-radius: 50px; border: 1px solid #222; }
        .avatar { width: 30px; height: 30px; background: var(--main-color); border-radius: 50%; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .case-selector { display: flex; gap: 20px; margin-top: 50px; z-index: 100; flex-wrap: wrap; justify-content: center; }
        .case-card { background: #111; padding: 20px; border-radius: 20px; border: 2px solid #333; cursor: pointer; transition: 0.3s; width: 180px; text-align: center; }
        .case-card:hover { transform: translateY(-10px); border-color: var(--main-color); }
        .case-card img { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; }

        .main-container { text-align: center; display: none; width: 90%; max-width: 600px; margin-top: 30px; z-index: 100; }
        input { background: #111; border: 2px solid #333; color: white; padding: 15px; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 18px; text-align: center; margin-bottom: 15px; }
        .btn { background: var(--main-color); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }

        /* Рулетка */
        .roulette-wrapper { position: relative; width: 100%; height: 160px; border: 2px solid #222; background: #000; overflow: hidden; border-radius: 15px; display: none; margin-top: 20px; }
        .selector { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: #ff4757; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 15px; transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1); }
        .item { width: 130px; height: 130px; margin: 0 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #111; border-radius: 12px; border-bottom: 4px solid #444; }
        .item img { width: 85px; height: 85px; object-fit: contain; }

        #result { display: none; margin-top: 20px; padding: 25px; border-radius: 20px; background: #111; border: 2px solid var(--main-color); }

        .admin-gear { position: fixed; bottom: 15px; right: 15px; opacity: 0.1; cursor: pointer; border: none; background: none; color: white; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; border-radius: 20px; border: 2px solid var(--main-color); z-index: 1000; width: 300px; text-align: center; box-shadow: 0 0 50px #000; }
    </style>
</head>
<body>

    <div id="particles-container"></div>

    <div class="header">
        <div class="user-profile">
            <div class="avatar" id="avatar">?</div>
            <span id="player-user">username</span>
        </div>
        <div style="font-size: 10px; color: #444;">ID PROTECTION ACTIVE</div>
    </div>

    <div id="selector-screen">
        <h1 style="text-align:center; margin-top:40px;">ВЫБЕРИТЕ КЕЙС</h1>
        <div class="case-selector">
            <div class="case-card" onclick="selectCase('spring')">
                <img src="https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076">
                <h3>ВЕСЕННИЙ</h3>
            </div>
            <div class="case-card" style="border-color:var(--winter-color);" onclick="selectCase('winter')">
                <img src="https://cdn-icons-png.flaticon.com/512/2322/2322731.png">
                <h3 style="color:var(--winter-color);">ЗИМНИЙ</h3>
            </div>
        </div>
    </div>

    <div class="main-container" id="case-screen">
        <h1 id="case-title">КЕЙС</h1>
        <img src="" id="case-preview" style="width:140px; height:140px; border-radius:50%; border:3px solid var(--main-color); margin-bottom:20px;">

        <div id="setup">
            <input type="text" id="id-key" placeholder="ВСТАВЬТЕ СЕКРЕТНЫЙ ID">
            <button class="btn" id="main-btn" onclick="startSpin()">АКТИВИРОВАТЬ</button>
        </div>

        <div class="roulette-wrapper" id="roulette-box">
            <div class="selector"></div>
            <div class="tape" id="tape"></div>
        </div>

        <div id="result">
            <h2 id="win-name"></h2>
            <p id="win-rarity"></p>
            <button class="btn" onclick="location.reload()" style="width:auto; padding:5px 20px;">В МЕНЮ</button>
        </div>
    </div>

    <button class="admin-gear" onclick="adminAuth()">⚙️</button>

    <div id="admin-panel">
        <h3 style="color:var(--main-color);">АДМИН-ПАНЕЛЬ</h3>
        <button class="btn" style="font-size:12px; margin-bottom:5px;" onclick="makeKey('SPRG')">КЛЮЧ ВЕСНА</button>
        <button class="btn" style="font-size:12px; background:var(--winter-color);" onclick="makeKey('WINT')">КЛЮЧ ЗИМА</button>
        <div id="keys-log" style="background:#000; margin-top:10px; padding:10px; font-size:10px; text-align:left; max-height:100px; overflow-y:auto; color:#00ff00;">Действующих ключей нет</div>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="margin-top:15px; color:gray; background:none; border:none;">Закрыть</button>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1483941280248496210/QHWJYcnhPD8Voht5mElw7KVNX-vr4yU5gHQrFoAwTE14vqB9MNnIISuTCjOfMYCEq0cA";
        const ADMIN_PASS = "1337";
        
        // ВАЖНО: Список ключей теперь хранится тут
        let validKeys = []; 

        let selectedType = "";
        let usernameDiscord = "гость";

        const items = {
            spring: [
                { name: "Storm Bringer", img: "https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076", rarity: "Легендарный", color: "#ffae00", chance: 1 },
                { name: "Grass Blade", img: "https://cdn-icons-png.flaticon.com/512/615/615075.png", rarity: "Обычный", color: "#aaa", chance: 99 }
            ],
            winter: [
                { name: "Ice King Sword", img: "https://cdn-icons-png.flaticon.com/512/2322/2322731.png", rarity: "Легендарный", color: "#ffae00", chance: 1 },
                { name: "Snowball", img: "https://cdn-icons-png.flaticon.com/512/2334/2334861.png", rarity: "Обычный", color: "#aaa", chance: 99 }
            ]
        };

        window.onload = () => {
            let n = prompt("Твой Username в Discord (без @):");
            if(n) {
                usernameDiscord = n.toLowerCase().trim();
                document.getElementById('player-user').innerText = "@" + usernameDiscord;
                document.getElementById('avatar').innerText = usernameDiscord[0].toUpperCase();
            }
        };

        function selectCase(type) {
            selectedType = type;
            document.getElementById('selector-screen').style.display = 'none';
            document.getElementById('case-screen').style.display = 'block';
            spawnParticles(type);
            if(type === 'winter') {
                document.getElementById('case-title').innerText = "WINTER FROST ❄️";
                document.getElementById('case-preview').src = "https://cdn-icons-png.flaticon.com/512/2322/2322731.png";
                document.documentElement.style.setProperty('--main-color', '#00d4ff');
            } else {
                document.getElementById('case-title').innerText = "SPRING DROP 🌸";
                document.getElementById('case-preview').src = "https://r.jina.ai/i/9e67d268d8794f878950d24c0d481076";
                document.documentElement.style.setProperty('--main-color', '#00ffcc');
            }
        }

        function spawnParticles(type) {
            const container = document.getElementById('particles-container');
            const chars = type === 'winter' ? ['❄', '❅'] : ['🌸', '✨'];
            for(let i=0; i<20; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.innerText = chars[Math.floor(Math.random()*chars.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(p);
            }
        }

        function startSpin() {
            const inputKey = document.getElementById('id-key').value.trim();
            
            // ПРОВЕРКА: Есть ли ключ в списке созданных?
            if(!validKeys.includes(inputKey)) {
                alert("ОШИБКА: ДАННЫЙ КЛЮЧ НЕ СУЩЕСТВУЕТ ИЛИ УЖЕ ИСПОЛЬЗОВАН!");
                return;
            }

            // УДАЛЯЕМ КЛЮЧ (теперь он одноразовый)
            validKeys = validKeys.filter(k => k !== inputKey);
            
            document.getElementById('main-btn').disabled = true;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('roulette-box').style.display = 'block';

            const pool = items[selectedType];
            const tape = document.getElementById('tape');
            tape.innerHTML = "";

            for(let i=0; i<100; i++) {
                let it = pool[Math.floor(Math.random()*pool.length)];
                tape.innerHTML += `<div class="item" style="border-color:${it.color}"><img src="${it.img}"></div>`;
            }

            let r = Math.random() * 100, sum = 0, win;
            for (let i of pool) { sum += i.chance; if (r <= sum) { win = i; break; } }

            const blocks = tape.getElementsByClassName('item');
            blocks[90].innerHTML = `<img src="${win.img}">`;
            blocks[90].style.borderColor = win.color;

            setTimeout(() => {
                tape.style.transform = `translateX(-${(90 * 140) - (tape.parentElement.offsetWidth/2) + 70}px)`;
            }, 100);

            setTimeout(() => {
                document.getElementById('win-name').innerText = win.name;
                document.getElementById('win-rarity').innerText = win.rarity;
                document.getElementById('win-rarity').style.color = win.color;
                document.getElementById('result').style.display = 'block';

                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: `✅ **${usernameDiscord}** использовал ключ \`${inputKey}\` и выбил **${win.name}**!`
                    })
                });
            }, 8500);
        }

        function adminAuth() {
            if(prompt("Пароль:") === ADMIN_PASS) document.getElementById('admin-panel').style.display = 'block';
        }

        function makeKey(prefix) {
            const newKey = prefix + "-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            validKeys.push(newKey); // Добавляем ключ в "белый список"
            
            const log = document.getElementById('keys-log');
            if(log.innerText.includes("Действующих")) log.innerText = "";
            log.innerHTML += `<div>Ключ: <b>${newKey}</b></div>`;
            navigator.clipboard.writeText(newKey);
            alert("Ключ создан и активен: " + newKey);
        }
    </script>
</body>
</html>
